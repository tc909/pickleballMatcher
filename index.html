<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MatchFlow - v11.5</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background-color: #f8fafc; min-height: 100vh; color: #0f172a; -webkit-tap-highlight-color: transparent; }
    .max-w-md { max-width: 28rem; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
    .sticky-header { position: sticky; top: 0; z-index: 50; width: 100%; background: #0f172a; }
    header { padding: 1.5rem 1.5rem 1rem; border-bottom: 4px solid #f97316; }
    .tab-bar { display: flex; background: white; border-bottom: 1px solid #e2e8f0; width: 100%; }
    .tab-btn { flex: 1; padding: 1rem; font-size: 0.75rem; font-weight: 900; border: none; background: none; color: #94a3b8; letter-spacing: 0.05em; cursor: pointer; }
    .tab-active { border-bottom: 4px solid #f97316; color: #f97316; }
    main { padding: 1rem 1.5rem; flex: 1; }
    .card { background: white; border-radius: 1.5rem; padding: 1.5rem; margin-top: 0.5rem; border: 1px solid #e2e8f0; position: relative; }
    .card-live { border: 2px solid #f97316; box-shadow: 0 10px 25px rgba(249,115,22,0.15); padding: 1.25rem; overflow: hidden; }
    .card-done { background: #0f172a; border-color: #1e293b; color: white; overflow: hidden; }
    .card-preview { background: #1e293b; color: #94a3b8; border-color: #334155; opacity: 0.6; overflow: hidden; }
    .vs-orange { color: #f97316 !important; font-weight: 900; font-style: italic; font-size: 1.2rem; }
    .label-done { font-size: 10px; font-weight: 900; color: #f97316; background: rgba(249, 115, 22, 0.2); padding: 2px 8px; border-radius: 10px; }
    .score-done { color: #f97316; font-size: 1.8rem; font-weight: 900; }
    .score-input { width: 4.5rem; height: 4.5rem; text-align: center; background: #f1f5f9; border-radius: 1rem; border: 2px solid transparent; font-weight: 900; font-size: 1.5rem; }
    .score-input:focus { border-color: #f97316; outline: none; }
    .btn-orange { background: #f97316; color: white; border: none; padding: 1.25rem; border-radius: 1rem; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 0.95rem; letter-spacing: 0.1em; }
    .btn-orange:disabled { background: #cbd5e1; cursor: not-allowed; }
    .btn-export { background: #10b981; color: white; border: none; padding: 1rem; border-radius: 1rem; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.05em; margin-bottom: 1rem; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2); }
    .btn-reset { background: transparent; color: #f87171; border: 2px solid #fecaca; padding: 0.8rem; border-radius: 1.25rem; font-weight: 900; font-size: 0.7rem; width: 100%; cursor: pointer; margin-top: 1.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .hidden { display: none !important; }
    .stat-badge { background: #f1f5f9; padding: 0.4rem; border-radius: 0.75rem; text-align: center; min-width: 2.5rem; border-bottom: 4px solid #cbd5e1; font-weight: 900; }
    .input-block { background: #e2e8f0; padding: 1rem; border-radius: 1rem; margin-bottom: 1rem; }
    .styled-input { width: 100%; padding: 1rem; border-radius: 0.75rem; border: none; background: white; font-weight: 900; outline: none; text-transform: uppercase; margin-bottom: 0.5rem; }
    .autocomplete-container { position: relative; width: 100%; margin-bottom: 0.5rem; }
    .autocomplete-list { position: absolute; top: calc(100% - 0.2rem); left: 0; right: 0; background: white; border: 2px solid #e2e8f0; border-top: none; border-radius: 0 0 0.75rem 0.75rem; max-height: 220px; overflow-y: auto; z-index: 1000; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); display: none; }
    .autocomplete-item { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1rem; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-weight: 700; color: #0f172a; font-size: 0.85rem; }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover { background: #f1f5f9; }
    .delete-mem-btn { color: #f87171; font-size: 1.5rem; cursor: pointer; padding: 0 0.5rem; line-height: 1; display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 50%; }
    .delete-mem-btn:hover { background: #fecaca; }
  </style>
</head>
<body>
  <datalist id="events-list"></datalist>

  <div class="max-w-md">
    <div class="sticky-header">
      <header>
        <div style="color: white; font-weight: 900; font-style: italic; text-transform: uppercase; text-align: center; font-size: 1.5rem; margin-bottom:1rem;">Match<span style="color: #f97316;">Flow</span></div>
        <div id="current-match-ui"></div>
      </header>
      <div id="navigation" class="tab-bar hidden">
        <button onclick="switchTab('players')" id="nav-players" class="tab-btn tab-active">PLAYERS</button>
        <button onclick="switchTab('schedule')" id="nav-schedule" class="tab-btn">SCHEDULE</button>
        <button onclick="switchTab('leaderboard')" id="nav-leaderboard" class="tab-btn">LEADERBOARD</button>
      </div>
    </div>

    <main>
      <div id="view-setup">
        <div class="card">
          <div style="margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px dashed #cbd5e1;">
            <div style="font-size: 0.75rem; font-weight: 900; color: #64748b; margin-bottom: 0.5rem; text-transform: uppercase;">Event Info (For DUPR)</div>
            <div style="display: flex; gap: 0.5rem;">
              <input type="text" id="setup-event-name" list="events-list" placeholder="EVENT NAME" style="flex: 1; padding: 1rem; border-radius: 1rem; border: none; background: #f1f5f9; font-weight: 900; outline:none; text-transform:uppercase;">
              <input type="date" id="setup-event-date" style="width: 140px; padding: 1rem; border-radius: 1rem; border: none; background: #f1f5f9; font-weight: 900; outline:none; text-transform:uppercase;">
            </div>
          </div>

          <div class="input-block">
            <div style="font-size: 0.75rem; font-weight: 900; color: #64748b; margin-bottom: 0.5rem; text-transform: uppercase;">ADD NEW PLAYER</div>

            <div class="autocomplete-container">
              <input type="text" id="setup-name" onfocus="showPlayerSuggestions('setup-name', 'setup-dupr', 'setup-dropdown')" oninput="showPlayerSuggestions('setup-name', 'setup-dupr', 'setup-dropdown')" placeholder="PLAYER NAME" class="styled-input" autocomplete="off" style="margin-bottom:0; position:relative; z-index:1001;">
              <div id="setup-dropdown" class="autocomplete-list"></div>
            </div>

            <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
              <input type="text" id="setup-dupr" placeholder="DUPR ID (OPTIONAL)" style="flex: 1; padding: 1rem; border-radius: 0.75rem; border: none; background: white; font-weight: 900; outline:none; text-transform:uppercase;">
              <button onclick="addPlayer('setup-name', 'setup-dupr')" style="background:#0f172a; color:white; border:none; padding: 0 1.5rem; border-radius: 0.75rem; font-weight: 900; cursor:pointer;">ADD</button>
            </div>
          </div>

          <div style="font-size: 0.75rem; font-weight: 900; color: #f97316; margin-top: 1rem; text-align: center; letter-spacing: 0.05em;">⚠️ MINIMUM 4 PLAYERS REQUIRED TO START</div>
          <div id="setup-list" style="margin-top: 1rem; max-height:400px; min-height: 200px; overflow-y:auto; border: 1px solid #f1f5f9; border-radius: 1rem; padding: 0.5rem;"></div>
        </div>
        <button id="start-btn" onclick="startApp()" class="btn-orange" style="margin-top: 1.5rem;" disabled>MINIMUM 4 PLAYERS</button>
        <button onclick="resetData()" class="btn-reset">CLEAR MATCH DATA / START NEW SESSION</button>
      </div>

      <div id="view-game" class="hidden">
        <div id="tab-players-content">
          <div id="players-meta-controls"></div>
          <div id="player-stats-list" class="card" style="padding: 0; overflow: hidden;"></div>

          <div class="input-block" style="margin-top:1rem;">
            <div class="autocomplete-container">
              <input type="text" id="add-more-name" onfocus="showPlayerSuggestions('add-more-name', 'add-more-dupr', 'add-more-dropdown')" oninput="showPlayerSuggestions('add-more-name', 'add-more-dupr', 'add-more-dropdown')" placeholder="PLAYER NAME" class="styled-input" autocomplete="off" style="margin-bottom:0; position:relative; z-index:1001;">
              <div id="add-more-dropdown" class="autocomplete-list"></div>
            </div>

            <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
              <input type="text" id="add-more-dupr" placeholder="DUPR ID (OPTIONAL)" style="flex: 1; padding: 1rem; border-radius: 0.75rem; border: none; background: white; font-weight: 900; outline:none; text-transform:uppercase;">
              <button onclick="addPlayer('add-more-name', 'add-more-dupr')" style="background:#0f172a; color:white; border:none; padding: 0 1.5rem; border-radius: 0.75rem; font-weight: 900; cursor:pointer;">ADD</button>
            </div>
          </div>

          <button onclick="resetData()" class="btn-reset">CLEAR MATCH DATA / START NEW SESSION</button>
        </div>

        <div id="tab-schedule-content" class="hidden">
          <div id="schedule-meta-controls"></div>
          <div id="schedule-list"></div>
        </div>

        <div id="tab-leaderboard-content" class="hidden">
          <div style="text-align: center; margin-bottom: 1rem; color: #64748b; font-size: 0.75rem; font-weight: 900; text-transform: uppercase;">
            Dynamic Rating System (Base 3.500)
          </div>
          <div id="leaderboard-list"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // =============================
    // 1) Constants / Config
    // =============================
    const STORAGE_KEYS = {
      players: 'pb_players',
      history: 'pb_history',
      isStarted: 'pb_isStarted',
      matrix: 'pb_matrix',
      nextNum: 'pb_nextNum',
      baseCycle: 'pb_baseCycle',
      initialCount: 'pb_initialCount',
      eventName: 'pb_eventName',
      eventDate: 'pb_eventDate',
      memoryPlayers: 'pb_memory_players',
      memoryEvents: 'pb_memory_events',
      scoreType: 'pb_scoreType'
    };

    const DEFAULT_RATING = 3.5;
    const CYCLES = {
      4: [
        [0,1,2,3], [0,2,1,3], [0,3,1,2],
        [0,1,2,3], [0,2,1,3], [0,3,1,2],
        [0,1,2,3], [0,2,1,3], [0,3,1,2],
        [0,1,2,3], [0,2,1,3], [0,3,1,2]
      ],
      5: [
        [0,1,2,3], [0,4,1,2], [3,4,0,1], [2,4,0,3], [1,4,2,3],
        [0,2,1,3], [0,3,1,4], [0,4,2,3], [1,3,2,4], [1,2,3,4]
      ],
      6: [
        [0,1,2,3], [0,1,4,5], [2,3,4,5], [0,1,2,3], [0,1,4,5], [2,3,4,5],
        [0,1,2,3], [0,1,4,5], [2,3,4,5], [0,1,2,3], [0,1,4,5], [2,3,4,5]
      ],
      7: [
        [0,1,3,4], [1,2,4,5], [2,3,5,6], [3,4,6,0], [4,5,0,1], [5,6,1,2], [6,0,2,3],
        [0,1,3,4], [1,2,4,5], [2,3,5,6], [3,4,6,0], [4,5,0,1], [5,6,1,2], [6,0,2,3]
      ],
      8: [
        [0,1,2,3], [4,5,6,7], [0,1,4,5], [2,3,6,7], [0,2,4,6], [1,3,5,7], [0,3,4,7],
        [1,2,5,6], [0,1,6,7], [2,3,4,5], [0,2,5,7], [1,3,4,6], [0,3,5,6], [1,2,4,7]
      ]
    };

    // =============================
    // 2) DOM references
    // =============================
    const els = {
      eventsList: document.getElementById('events-list'),
      navigation: document.getElementById('navigation'),
      currentMatchUI: document.getElementById('current-match-ui'),
      viewSetup: document.getElementById('view-setup'),
      viewGame: document.getElementById('view-game'),
      setupEventName: document.getElementById('setup-event-name'),
      setupEventDate: document.getElementById('setup-event-date'),
      setupList: document.getElementById('setup-list'),
      startBtn: document.getElementById('start-btn'),
      playerStatsList: document.getElementById('player-stats-list'),
      playersMetaControls: document.getElementById('players-meta-controls'),
      scheduleMetaControls: document.getElementById('schedule-meta-controls'),
      scheduleList: document.getElementById('schedule-list'),
      leaderboardList: document.getElementById('leaderboard-list'),
      navPlayers: document.getElementById('nav-players'),
      navSchedule: document.getElementById('nav-schedule'),
      navLeaderboard: document.getElementById('nav-leaderboard'),
      tabPlayersContent: document.getElementById('tab-players-content'),
      tabScheduleContent: document.getElementById('tab-schedule-content'),
      tabLeaderboardContent: document.getElementById('tab-leaderboard-content')
    };

    // =============================
    // 3) State
    // =============================
    let state = loadAppState();

    // =============================
    // 4) Persistence
    // =============================
    function loadJSON(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (error) {
        return fallback;
      }
    }

    function loadAppState() {
      const players = loadJSON(STORAGE_KEYS.players, []).map(player => ({
        ...player,
        rating: typeof player.rating === 'number' ? player.rating : DEFAULT_RATING,
        duprId: player.duprId || ''
      }));

      return {
        players,
        matchHistory: loadJSON(STORAGE_KEYS.history, []),
        isStarted: localStorage.getItem(STORAGE_KEYS.isStarted) === 'true',
        partnerMatrix: loadJSON(STORAGE_KEYS.matrix, {}),
        nextPlayerNum: parseInt(localStorage.getItem(STORAGE_KEYS.nextNum), 10) || 1,
        baseCycleLength: parseInt(localStorage.getItem(STORAGE_KEYS.baseCycle), 10) || 12,
        initialSetupCount: parseInt(localStorage.getItem(STORAGE_KEYS.initialCount), 10) || 6,
        activeTab: 'players'
      };
    }

    function saveAppState() {
      localStorage.setItem(STORAGE_KEYS.players, JSON.stringify(state.players));
      localStorage.setItem(STORAGE_KEYS.history, JSON.stringify(state.matchHistory));
      localStorage.setItem(STORAGE_KEYS.isStarted, String(state.isStarted));
      localStorage.setItem(STORAGE_KEYS.matrix, JSON.stringify(state.partnerMatrix));
      localStorage.setItem(STORAGE_KEYS.nextNum, String(state.nextPlayerNum));
      localStorage.setItem(STORAGE_KEYS.baseCycle, String(state.baseCycleLength));
      localStorage.setItem(STORAGE_KEYS.initialCount, String(state.initialSetupCount));
    }

    function loadPlayerMemory() {
      return loadJSON(STORAGE_KEYS.memoryPlayers, {});
    }

    function savePlayerMemory(memory) {
      localStorage.setItem(STORAGE_KEYS.memoryPlayers, JSON.stringify(memory));
    }

    function loadEventMemory() {
      return loadJSON(STORAGE_KEYS.memoryEvents, []);
    }

    function saveEventMemory(memory) {
      localStorage.setItem(STORAGE_KEYS.memoryEvents, JSON.stringify(memory));
    }

    function resetSessionStorage() {
      [
        STORAGE_KEYS.players,
        STORAGE_KEYS.history,
        STORAGE_KEYS.isStarted,
        STORAGE_KEYS.matrix,
        STORAGE_KEYS.nextNum,
        STORAGE_KEYS.baseCycle,
        STORAGE_KEYS.initialCount
      ].forEach(key => localStorage.removeItem(key));
    }

    // =============================
    // 5) Helpers / Derived state
    // =============================
    function getLocalYYYYMMDD() {
      const d = new Date();
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function titleCaseName(name) {
      if (!name) return '';
      return name.charAt(0).toUpperCase() + name.slice(1);
    }

    function getActivePlayers(dataState = state) {
      return dataState.players.filter(player => player.isActive);
    }

    function getCurrentMatch(dataState = state) {
      return dataState.matchHistory.find(match => !match.completed) || null;
    }

    function getCompletedMatches(dataState = state) {
      return dataState.matchHistory
        .filter(match => match.completed)
        .sort((a, b) => a.round - b.round);
    }

    function getPlayerById(id, dataState = state) {
      return dataState.players.find(player => player.id === id) || null;
    }

    function getDisplayPlayer(id, dataState = state) {
      return getPlayerById(id, dataState) || { name: 'Gone', playerNum: '?' };
    }

    function syncCycleConfig(dataState = state) {
      const activeCount = getActivePlayers(dataState).length;
      dataState.initialSetupCount = activeCount;
      dataState.baseCycleLength = CYCLES[activeCount] ? CYCLES[activeCount].length : (activeCount <= 6 ? 12 : 14);
    }

    function ensureSetupPlayerNumbers(dataState = state) {
      if (dataState.isStarted) return;
      dataState.players.forEach((player, index) => {
        player.playerNum = index + 1;
      });
      dataState.nextPlayerNum = dataState.players.length + 1;
    }

    function clonePlayers(players) {
      return players.map(player => ({ ...player }));
    }

    function cloneMatrix(matrix) {
      return JSON.parse(JSON.stringify(matrix));
    }

    function getEventName() {
      return localStorage.getItem(STORAGE_KEYS.eventName) || '';
    }

    function getEventDate() {
      const rawDate = localStorage.getItem(STORAGE_KEYS.eventDate);
      return (!rawDate || !/^\d{4}-\d{2}-\d{2}$/.test(rawDate)) ? getLocalYYYYMMDD() : rawDate;
    }

    function getScoreType() {
      return localStorage.getItem(STORAGE_KEYS.scoreType) === 'SIDEOUT' ? 'SIDEOUT' : 'RALLY';
    }

    // =============================
    // 6) Domain / Engine
    // =============================
    function calculateMatch(pool, roundIdx, currentMatrix, cycleCount, cycleLength) {
      const active = pool.filter(player => player.isActive);
      if (active.length < 4) return null;

      let selected;
      if (active.length === cycleCount && CYCLES[cycleCount]) {
        const sortedActive = [...active].sort((a, b) => a.playerNum - b.playerNum);
        const cyclePairing = CYCLES[cycleCount][roundIdx % cycleLength];
        selected = cyclePairing.map(index => sortedActive[index]);
      } else {
        const sorted = [...active].sort((a, b) => {
          return (a.playCount - b.playCount) || (a.consecutive - b.consecutive) || (Math.random() - 0.5);
        });
        const canPlay = sorted.filter(player => player.consecutive < 2);
        selected = canPlay.length >= 4 ? canPlay.slice(0, 4) : sorted.slice(0, 4);
      }

      let best = {
        a: [selected[0].id, selected[1].id],
        b: [selected[2].id, selected[3].id],
        minWeight: Number.POSITIVE_INFINITY
      };

      const combinations = [[0,1,2,3], [0,2,1,3], [0,3,1,2]].sort(() => Math.random() - 0.5);
      combinations.forEach(combination => {
        const p1 = selected[combination[0]].id;
        const p2 = selected[combination[1]].id;
        const p3 = selected[combination[2]].id;
        const p4 = selected[combination[3]].id;
        const weight = (currentMatrix[p1]?.[p2] || 0) + (currentMatrix[p3]?.[p4] || 0);

        if (weight < best.minWeight) {
          best = { a: [p1, p2], b: [p3, p4], minWeight: weight };
        }
      });

      return {
        teamAIds: best.a,
        teamBIds: best.b,
        allIds: [...best.a, ...best.b]
      };
    }

    function calculateNextMatchForState(dataState = state, roundIdx = null, matrix = null, players = null) {
      const sourcePlayers = players || dataState.players;
      const sourceMatrix = matrix || dataState.partnerMatrix;
      const effectiveRoundIdx = roundIdx ?? getCompletedMatches(dataState).length;
      return calculateMatch(
        sourcePlayers,
        effectiveRoundIdx,
        sourceMatrix,
        dataState.initialSetupCount,
        dataState.baseCycleLength
      );
    }

    function incrementPartnerMatrix(matrix, id1, id2) {
      if (!matrix[id1]) matrix[id1] = {};
      if (!matrix[id2]) matrix[id2] = {};
      matrix[id1][id2] = (matrix[id1][id2] || 0) + 1;
      matrix[id2][id1] = (matrix[id2][id1] || 0) + 1;
    }

    function applyPartnerHistory(dataState, match) {
      incrementPartnerMatrix(dataState.partnerMatrix, match.teamAIds[0], match.teamAIds[1]);
      incrementPartnerMatrix(dataState.partnerMatrix, match.teamBIds[0], match.teamBIds[1]);
    }

    function applyLeaderboardRating(dataState, match) {
      const pA1 = getPlayerById(match.teamAIds[0], dataState);
      const pA2 = getPlayerById(match.teamAIds[1], dataState);
      const pB1 = getPlayerById(match.teamBIds[0], dataState);
      const pB2 = getPlayerById(match.teamBIds[1], dataState);

      if (!pA1 || !pA2 || !pB1 || !pB2) return { ratingChangeA: 0, ratingChangeB: 0 };

      const rA = (pA1.rating + pA2.rating) / 2;
      const rB = (pB1.rating + pB2.rating) / 2;
      const scoreResultA = match.scoreA > match.scoreB ? 1 : (match.scoreA < match.scoreB ? 0 : 0.5);
      const expectedA = 1 / (1 + Math.pow(10, (rB - rA) / 1.0));
      const pointDiffMultiplier = 1 + (Math.abs(match.scoreA - match.scoreB) / 11);
      const K = 0.4;
      const ratingChangeA = K * (scoreResultA - expectedA) * pointDiffMultiplier;
      const ratingChangeB = -ratingChangeA;

      dataState.players = dataState.players.map(player => {
        if (match.teamAIds.includes(player.id)) {
          return { ...player, rating: player.rating + ratingChangeA };
        }
        if (match.teamBIds.includes(player.id)) {
          return { ...player, rating: player.rating + ratingChangeB };
        }
        return player;
      });

      return { ratingChangeA, ratingChangeB };
    }

    function applyPlayerRoundStats(dataState, match) {
      dataState.players = dataState.players.map(player => {
        if (!match.allIds.includes(player.id)) {
          return { ...player, consecutive: 0 };
        }

        const won = (match.teamAIds.includes(player.id) && match.scoreA > match.scoreB) ||
                    (match.teamBIds.includes(player.id) && match.scoreB > match.scoreA);

        return {
          ...player,
          playCount: player.playCount + 1,
          consecutive: player.consecutive + 1,
          wins: player.wins + (won ? 1 : 0),
          losses: player.losses + (won ? 0 : 1)
        };
      });
    }

    function createNextLiveMatch(dataState) {
      const current = getCurrentMatch(dataState);
      const nextRound = current ? current.round + 1 : (getCompletedMatches(dataState).length + 1);
      const nextMatch = calculateNextMatchForState(dataState, getCompletedMatches(dataState).length);

      dataState.matchHistory.unshift({
        round: nextRound,
        completed: false,
        scoreA: '',
        scoreB: '',
        allIds: nextMatch?.allIds || [],
        teamAIds: nextMatch?.teamAIds || [],
        teamBIds: nextMatch?.teamBIds || []
      });
    }

    function refreshLiveMatchIfImpacted(affectedPlayerId) {
      const current = getCurrentMatch();
      if (!state.isStarted || !current || current.completed) return;
      if (!current.allIds.includes(affectedPlayerId)) return;

      const recalculated = calculateNextMatchForState(state, getCompletedMatches(state).length);
      if (recalculated) {
        Object.assign(current, recalculated);
      } else {
        current.allIds = [];
        current.teamAIds = [];
        current.teamBIds = [];
      }
    }

    function simulateSchedulePreview(dataState = state) {
      const previewHtml = [];
      const completed = getCompletedMatches(dataState);
      const current = getCurrentMatch(dataState);

      const tempPlayers = clonePlayers(dataState.players);
      const tempMatrix = cloneMatrix(dataState.partnerMatrix);

      const currentRoundNum = completed.length + (current ? 1 : 0);
      const targetTotalGames = Math.ceil((currentRoundNum === 0 ? 1 : currentRoundNum) / dataState.baseCycleLength) * dataState.baseCycleLength;
      let simulationRoundIndex = currentRoundNum;

      if (current && current.allIds.length === 4) {
        current.allIds.forEach(id => {
          const player = tempPlayers.find(item => item.id === id);
          if (player) {
            player.playCount += 1;
            player.consecutive += 1;
          }
        });
        tempPlayers.forEach(player => {
          if (!current.allIds.includes(player.id)) player.consecutive = 0;
        });
        incrementPartnerMatrix(tempMatrix, current.teamAIds[0], current.teamAIds[1]);
        incrementPartnerMatrix(tempMatrix, current.teamBIds[0], current.teamBIds[1]);
      }

      while (simulationRoundIndex < targetTotalGames) {
        const match = calculateMatch(tempPlayers, simulationRoundIndex, tempMatrix, dataState.initialSetupCount, dataState.baseCycleLength);
        if (!match) break;

        previewHtml.push(`
          <div class="card card-preview">
            <div style="font-size:10px;color:#94a3b8;font-weight:900;margin-bottom:10px;text-align:center;">GAME ${simulationRoundIndex + 1} · PREVIEW</div>
            <div style="display:flex;justify-content:space-between;text-align:center;font-weight:900;">
              <div style="width:40%;">${getDisplayPlayer(match.teamAIds[0], dataState).name}<br>${getDisplayPlayer(match.teamAIds[1], dataState).name}</div>
              <div class="vs-orange" style="opacity:0.5;">VS</div>
              <div style="width:40%;">${getDisplayPlayer(match.teamBIds[0], dataState).name}<br>${getDisplayPlayer(match.teamBIds[1], dataState).name}</div>
            </div>
          </div>
        `);

        match.allIds.forEach(id => {
          const player = tempPlayers.find(item => item.id === id);
          if (player) {
            player.playCount += 1;
            player.consecutive += 1;
          }
        });
        tempPlayers.forEach(player => {
          if (!match.allIds.includes(player.id)) player.consecutive = 0;
        });

        incrementPartnerMatrix(tempMatrix, match.teamAIds[0], match.teamAIds[1]);
        incrementPartnerMatrix(tempMatrix, match.teamBIds[0], match.teamBIds[1]);

        simulationRoundIndex += 1;
      }

      return previewHtml.join('');
    }

    // =============================
    // 7) Actions
    // =============================
    function resetData() {
      if (confirm('Are you sure you want to clear today’s schedule and scores?\n\nThis will not delete your saved player and DUPR memory.')) {
        resetSessionStorage();
        location.reload();
      }
    }

    function addPlayer(nameInputId, duprInputId) {
      const nameInput = document.getElementById(nameInputId);
      const duprInput = document.getElementById(duprInputId);
      let rawName = nameInput.value.trim();
      const duprId = (duprInput?.value || '').trim().toUpperCase();

      if (!rawName) return;

      const lowerName = rawName.toLowerCase();
      if (state.players.some(player => player.name.toLowerCase() === lowerName && player.isActive)) {
        alert('This player is already active.');
        return;
      }

      const existingInactive = state.players.find(player => player.name.toLowerCase() === lowerName && !player.isActive);
      if (existingInactive) {
        handleActivate(existingInactive.id);
        nameInput.value = '';
        if (duprInput) duprInput.value = '';
        hideAutocompleteLists();
        return;
      }

      const name = titleCaseName(rawName);
      state.players.push({
        id: Date.now(),
        playerNum: state.nextPlayerNum++,
        name,
        duprId,
        playCount: 0,
        wins: 0,
        losses: 0,
        consecutive: 0,
        isActive: true,
        rating: DEFAULT_RATING
      });

      const memory = loadPlayerMemory();
      if (duprId) memory[name.toLowerCase()] = duprId;
      else if (memory[name.toLowerCase()] === undefined) memory[name.toLowerCase()] = '';
      savePlayerMemory(memory);

      if (!state.isStarted) {
        ensureSetupPlayerNumbers(state);
      } else {
        syncCycleConfig(state);
      }

      nameInput.value = '';
      if (duprInput) duprInput.value = '';
      hideAutocompleteLists();
      saveAppState();
      renderApp();
    }

    function removePlayerSetup(id) {
      state.players = state.players.filter(player => player.id !== id);
      ensureSetupPlayerNumbers(state);
      saveAppState();
      renderApp();
    }

    function handleActivate(id) {
      state.players = state.players.map(player => player.id === id ? { ...player, isActive: true } : player);
      syncCycleConfig(state);
      saveAppState();
      renderApp();
    }

    function handleDrop(id) {
      if (!confirm('Remove this player from upcoming matches?\n\nIf the player is currently in the live game, the match will be recalculated automatically.')) return;

      state.players = state.players.map(player => player.id === id ? { ...player, isActive: false, consecutive: 0 } : player);
      syncCycleConfig(state);
      refreshLiveMatchIfImpacted(id);

      const current = getCurrentMatch();
      if (state.isStarted && current && current.allIds.length < 4) {
        alert('Warning: fewer than 4 active players remain. A match cannot be generated until more players are added.');
      }

      saveAppState();
      renderApp();
    }

    function handleSubs(oldId) {
      const rawName = prompt('New substitute player name:');
      if (!rawName) return;

      const newName = rawName.trim();
      if (!newName) return;
      if (state.players.some(player => player.name.toLowerCase() === newName.toLowerCase() && player.isActive)) {
        alert('This player is already active.');
        return;
      }

      const memory = loadPlayerMemory();
      const savedDupr = memory[newName.toLowerCase()] || '';
      const message = savedDupr
        ? `Saved DUPR ID found: [${savedDupr}]. Enter a new one to change it, or press OK to keep it:`
        : 'DUPR ID (optional):';

      let duprId = prompt(message, savedDupr);
      if (duprId === null) return;
      duprId = duprId.trim().toUpperCase();
      memory[newName.toLowerCase()] = duprId;
      savePlayerMemory(memory);

      state.players = state.players.map(player => player.id === oldId ? { ...player, isActive: false, consecutive: 0 } : player);
      state.players.push({
        id: Date.now(),
        playerNum: state.nextPlayerNum++,
        name: titleCaseName(newName),
        duprId,
        playCount: 0,
        wins: 0,
        losses: 0,
        consecutive: 0,
        isActive: true,
        rating: DEFAULT_RATING
      });

      refreshLiveMatchIfImpacted(oldId);
      saveAppState();
      renderApp();
    }

    function submitScoreAction() {
      const scoreA = Math.max(0, parseInt(document.getElementById('scA')?.value, 10));
      const scoreB = Math.max(0, parseInt(document.getElementById('scB')?.value, 10));
      if (Number.isNaN(scoreA) || Number.isNaN(scoreB)) {
        alert('Please enter valid scores.');
        return;
      }

      const current = getCurrentMatch();
      if (!current || current.allIds.length !== 4) {
        alert('There is no live match available to submit.');
        return;
      }

      current.scoreA = scoreA;
      current.scoreB = scoreB;
      current.completed = true;

      applyLeaderboardRating(state, current);
      applyPartnerHistory(state, current);
      applyPlayerRoundStats(state, current);
      createNextLiveMatch(state);

      saveAppState();
      renderApp();
    }

    function handleEdit(round) {
      const target = state.matchHistory.find(match => match.round === round);
      if (!target) return;

      const nextA = prompt('Team A score (editing past scores will not recalculate leaderboard ratings):', target.scoreA);
      const nextB = prompt('Team B score:', target.scoreB);
      if (nextA === null || nextB === null) return;

      const parsedA = Math.max(0, parseInt(nextA, 10));
      const parsedB = Math.max(0, parseInt(nextB, 10));
      if (Number.isNaN(parsedA) || Number.isNaN(parsedB)) {
        alert('Please enter valid scores.');
        return;
      }

      target.scoreA = parsedA;
      target.scoreB = parsedB;
      saveAppState();
      renderApp();
    }

    function startApp() {
      const eventName = els.setupEventName.value.trim();
      const eventDate = els.setupEventDate.value || getLocalYYYYMMDD();
      localStorage.setItem(STORAGE_KEYS.eventName, eventName);
      localStorage.setItem(STORAGE_KEYS.eventDate, eventDate);

      if (eventName) {
        const eventMemory = loadEventMemory();
        if (!eventMemory.includes(eventName)) {
          eventMemory.push(eventName);
          saveEventMemory(eventMemory);
          updateEventsList();
        }
      }

      syncCycleConfig(state);
      const firstMatch = calculateNextMatchForState(state, 0);
      state.matchHistory.push({
        round: 1,
        scoreA: '',
        scoreB: '',
        completed: false,
        allIds: firstMatch?.allIds || [],
        teamAIds: firstMatch?.teamAIds || [],
        teamBIds: firstMatch?.teamBIds || []
      });
      state.isStarted = true;

      saveAppState();
      renderApp();
    }

    function switchTab(tab) {
      state.activeTab = tab;
      renderApp();
    }

    function editEventName() {
      const currentName = getEventName();
      const nextName = prompt('Edit event name:', currentName);
      if (nextName === null) return;
      const trimmed = nextName.trim();
      localStorage.setItem(STORAGE_KEYS.eventName, trimmed);
      if (els.setupEventName) els.setupEventName.value = trimmed;

      if (trimmed) {
        const eventMemory = loadEventMemory();
        if (!eventMemory.includes(trimmed)) {
          eventMemory.push(trimmed);
          saveEventMemory(eventMemory);
          updateEventsList();
        }
      }

      renderApp();
    }

    function editPlayer(playerId) {
      const player = getPlayerById(playerId);
      if (!player) return;

      const nextNameRaw = prompt('Edit player name:', player.name);
      if (nextNameRaw === null) return;
      const nextName = titleCaseName(nextNameRaw.trim());
      if (!nextName) {
        alert('Player name cannot be empty.');
        return;
      }

      const duplicateActive = state.players.find(item => item.id !== playerId && item.name.toLowerCase() === nextName.toLowerCase() && item.isActive);
      if (duplicateActive) {
        alert('This player is already active.');
        return;
      }

      const nextDuprRaw = prompt('Edit DUPR ID:', player.duprId || '');
      if (nextDuprRaw === null) return;
      const nextDupr = nextDuprRaw.trim().toUpperCase();

      state.players = state.players.map(item => item.id === playerId ? { ...item, name: nextName, duprId: nextDupr } : item);

      const memory = loadPlayerMemory();
      memory[nextName.toLowerCase()] = nextDupr;
      savePlayerMemory(memory);

      saveAppState();
      renderApp();
    }

    function updateScoreType(value) {
      const normalized = value === 'SIDEOUT' ? 'SIDEOUT' : 'RALLY';
      localStorage.setItem(STORAGE_KEYS.scoreType, normalized);
      renderApp();
    }

    function exportDUPRCSV() {
      const completedMatches = getCompletedMatches(state);
      if (completedMatches.length === 0) {
        alert('There are no completed matches to export.');
        return;
      }

      const eventName = getEventName() || 'Casual_Match';
      const safeEventName = eventName.replace(/[\/\\?%*:|"<>.]/g, '').replace(/\s+/g, '_');
      const eventDate = getEventDate();
      const scoreType = getScoreType();

      let csvContent = 'data:text/csv;charset=utf-8,\uFEFF';
      csvContent += 'matchType,scoreType,event,date,playerA1,playerA1DuprId,playerA2,playerA2DuprId,playerB1,playerB1DuprId,playerB2,playerB2DuprId,teamAGame1,teamBGame1,teamAGame2,teamBGame2,teamAGame3,teamBGame3,teamAGame4,teamBGame4,teamAGame5,teamBGame5\n';

      completedMatches.forEach(match => {
        const pA1 = getPlayerById(match.teamAIds[0], state) || {};
        const pA2 = getPlayerById(match.teamAIds[1], state) || {};
        const pB1 = getPlayerById(match.teamBIds[0], state) || {};
        const pB2 = getPlayerById(match.teamBIds[1], state) || {};

        const row = [
          'D',
          scoreType,
          eventName,
          eventDate,
          pA1.name || 'Unknown', pA1.duprId || '',
          pA2.name || 'Unknown', pA2.duprId || '',
          pB1.name || 'Unknown', pB1.duprId || '',
          pB2.name || 'Unknown', pB2.duprId || '',
          match.scoreA, match.scoreB,
          '', '', '', '', '', '', '', ''
        ];

        csvContent += row.map(item => `"${item}"`).join(',') + '\n';
      });

      const encodedUri = encodeURI(csvContent);
      const link = document.createElement('a');
      link.setAttribute('href', encodedUri);
      link.setAttribute('download', `DUPR_${safeEventName}_${eventDate}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function updateEventsList() {
      const events = loadEventMemory();
      els.eventsList.innerHTML = events.map(event => `<option value="${event}">`).join('');
    }

    function hideAutocompleteLists() {
      document.querySelectorAll('.autocomplete-list').forEach(list => {
        list.style.display = 'none';
      });
    }

    function showPlayerSuggestions(nameInputId, duprInputId, dropdownId) {
      const input = document.getElementById(nameInputId);
      const dropdown = document.getElementById(dropdownId);
      const duprInput = document.getElementById(duprInputId);
      const memory = loadPlayerMemory();
      const value = input.value.trim().toLowerCase();

      if (value && memory[value] !== undefined && duprInput.value.trim() === '') {
        duprInput.value = memory[value];
      }

      dropdown.innerHTML = '';

      const matches = Object.keys(memory).filter(nameKey => {
        const isActiveAlready = state.players.some(player => player.name.toLowerCase() === nameKey && player.isActive);
        return nameKey.startsWith(value) && !isActiveAlready;
      });

      if (matches.length === 0) {
        dropdown.style.display = 'none';
        return;
      }

      matches.forEach(matchName => {
        const item = document.createElement('div');
        item.className = 'autocomplete-item';

        const nameSpan = document.createElement('span');
        nameSpan.style.flex = '1';
        const displayName = titleCaseName(matchName);
        nameSpan.innerHTML = `${displayName} <span style="color:#94a3b8; font-size:10px; margin-left:5px;">${memory[matchName] ? `(${memory[matchName]})` : ''}</span>`;
        nameSpan.onclick = () => {
          input.value = displayName;
          duprInput.value = memory[matchName];
          dropdown.style.display = 'none';
          addPlayer(nameInputId, duprInputId);
        };

        const deleteSpan = document.createElement('span');
        deleteSpan.innerHTML = '&times;';
        deleteSpan.className = 'delete-mem-btn';
        deleteSpan.onclick = event => {
          event.stopPropagation();
          if (confirm(`Are you sure you want to permanently delete "${displayName}" from memory?`)) {
            delete memory[matchName];
            savePlayerMemory(memory);
            showPlayerSuggestions(nameInputId, duprInputId, dropdownId);
          }
        };

        item.appendChild(nameSpan);
        item.appendChild(deleteSpan);
        dropdown.appendChild(item);
      });

      dropdown.style.display = 'block';
    }

            </div>
            <div style="display:flex;justify-content:space-between;text-align:center;font-weight:900;">
              <div style="width:40%;">${getDisplayPlayer(match.teamAIds[0], state).name}<br>${getDisplayPlayer(match.teamAIds[1], state).name}<div class="score-done">${match.scoreA}</div></div>
              <div class="vs-orange">VS</div>
              <div style="width:40%;">${getDisplayPlayer(match.teamBIds[0], state).name}<br>${getDisplayPlayer(match.teamBIds[1], state).name}<div class="score-done">${match.scoreB}</div></div>
            </div>
          </div>
        `;
      });

      if (current && current.allIds.length === 4) {
        html += `
          <div class="card card-live" style="border:none; border-left:4px solid #f97316; padding:1.25rem;">
            <div style="font-size:11px;color:#f97316;font-weight:900;margin-bottom:10px;text-align:center;letter-spacing:0.05em;">GAME ${current.round} · LIVE NOW</div>
            <div style="display:flex;justify-content:space-between;text-align:center;font-weight:900;">
              <div style="width:40%;">${getDisplayPlayer(current.teamAIds[0], state).name}<br>${getDisplayPlayer(current.teamAIds[1], state).name}</div>
              <div class="vs-orange">VS</div>
              <div style="width:40%;">${getDisplayPlayer(current.teamBIds[0], state).name}<br>${getDisplayPlayer(current.teamBIds[1], state).name}</div>
            </div>
          </div>
        `;
      }

      html += simulateSchedulePreview(state);
      els.scheduleList.innerHTML = html;
    }

    function renderTabs() {
      els.navPlayers.className = `tab-btn ${state.activeTab === 'players' ? 'tab-active' : ''}`;
      els.navSchedule.className = `tab-btn ${state.activeTab === 'schedule' ? 'tab-active' : ''}`;
      els.navLeaderboard.className = `tab-btn ${state.activeTab === 'leaderboard' ? 'tab-active' : ''}`;

      els.tabPlayersContent.className = state.activeTab === 'players' ? '' : 'hidden';
      els.tabScheduleContent.className = state.activeTab === 'schedule' ? '' : 'hidden';
      els.tabLeaderboardContent.className = state.activeTab === 'leaderboard' ? '' : 'hidden';
    }

    function renderApp() {
      renderAppShell();
      renderSetupList();
      renderCurrentMatch();
      renderPlayersTab();
      renderLeaderboardTab();
      renderTabs();
      renderScheduleTab();
    }

    // =============================
    // 10) Boot
    // =============================
    function initializeEventInputs() {
      els.setupEventName.value = getEventName();
      els.setupEventDate.value = getEventDate();
    }

    document.addEventListener('click', event => {
      if (!event.target.closest('.autocomplete-container')) {
        hideAutocompleteLists();
      }
    });

    initializeEventInputs();
    updateEventsList();
    renderApp();

    // expose globals for inline handlers
    window.showPlayerSuggestions = showPlayerSuggestions;
    window.addPlayer = addPlayer;
    window.removePlayerSetup = removePlayerSetup;
    window.handleActivate = handleActivate;
    window.handleDrop = handleDrop;
    window.handleSubs = handleSubs;
    window.submitScoreAction = submitScoreAction;
    window.handleEdit = handleEdit;
    window.startApp = startApp;
    window.switchTab = switchTab;
    window.editEventName = editEventName;
    window.editPlayer = editPlayer;
    window.exportDUPRCSV = exportDUPRCSV;
    window.updateScoreType = updateScoreType;
    window.resetData = resetData;
  </script>
</body>
</html>
