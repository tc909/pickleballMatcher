<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pickleball Matcher v10.7 - </title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #f8fafc; min-height: 100vh; color: #0f172a; -webkit-tap-highlight-color: transparent; }
        .max-w-md { max-width: 28rem; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
        
        .sticky-header { position: sticky; top: 0; z-index: 50; width: 100%; background: #0f172a; }
        header { padding: 1.5rem 1.5rem 1rem; border-bottom: 4px solid #f97316; }
        
        .tab-bar { display: flex; background: white; border-bottom: 1px solid #e2e8f0; width: 100%; }
        .tab-btn { flex: 1; padding: 1rem; font-size: 0.75rem; font-weight: 900; border: none; background: none; color: #94a3b8; letter-spacing: 0.05em; cursor: pointer; }
        .tab-active { border-bottom: 4px solid #f97316; color: #f97316; }

        main { padding: 1rem 1.5rem; flex: 1; }
        .card { background: white; border-radius: 1.5rem; padding: 1.5rem; margin-top: 0.5rem; border: 1px solid #e2e8f0; position: relative; overflow: hidden; }
        
        .card-live { border: 2px solid #f97316; box-shadow: 0 10px 25px rgba(249,115,22,0.15); padding: 1.25rem; }
        .card-done { background: #0f172a; border-color: #1e293b; color: white; }
        .card-preview { background: #1e293b; color: #94a3b8; border-color: #334155; opacity: 0.6; }

        .vs-orange { color: #f97316 !important; font-weight: 900; font-style: italic; font-size: 1.2rem; }
        .label-done { font-size: 10px; font-weight: 900; color: #f97316; background: rgba(249, 115, 22, 0.2); padding: 2px 8px; border-radius: 10px; }
        .score-done { color: #f97316; font-size: 1.8rem; font-weight: 900; }
        
        .score-input { width: 4.5rem; height: 4.5rem; text-align: center; background: #f1f5f9; border-radius: 1rem; border: 2px solid transparent; font-weight: 900; font-size: 1.5rem; }
        .score-input:focus { border-color: #f97316; outline: none; }
        .btn-orange { background: #f97316; color: white; border: none; padding: 1.25rem; border-radius: 1rem; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 0.95rem; letter-spacing: 0.1em; }
        .btn-orange:disabled { background: #cbd5e1; cursor: not-allowed; }
        .btn-export { background: #10b981; color: white; border: none; padding: 1rem; border-radius: 1rem; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.05em; margin-bottom: 1rem; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2); }
        .btn-reset { background: transparent; color: #f87171; border: 2px solid #fecaca; padding: 0.8rem; border-radius: 1.25rem; font-weight: 900; font-size: 0.7rem; width: 100%; cursor: pointer; margin-top: 1.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .hidden { display: none !important; }
        .stat-badge { background: #f1f5f9; padding: 0.4rem; border-radius: 0.75rem; text-align: center; min-width: 2.5rem; border-bottom: 4px solid #cbd5e1; font-weight: 900; }
        
        .input-block { background: #e2e8f0; padding: 1rem; border-radius: 1rem; margin-bottom: 1rem; }
        .styled-input { width: 100%; padding: 1rem; border-radius: 0.75rem; border: none; background: white; font-weight: 900; outline:none; text-transform:uppercase; margin-bottom: 0.5rem; }
        
        /* 客製化智慧下拉選單樣式 */
        .autocomplete-container { position: relative; width: 100%; margin-bottom: 0.5rem; }
        .autocomplete-list { position: absolute; top: calc(100% - 0.2rem); left: 0; right: 0; background: white; border: 2px solid #e2e8f0; border-top: none; border-radius: 0 0 0.75rem 0.75rem; max-height: 200px; overflow-y: auto; z-index: 1000; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); display: none; }
        .autocomplete-item { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1rem; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-weight: 700; color: #0f172a; font-size: 0.85rem; }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover { background: #f1f5f9; }
        .delete-mem-btn { color: #f87171; font-size: 1.5rem; cursor: pointer; padding: 0 0.5rem; line-height: 1; display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 50%; }
        .delete-mem-btn:hover { background: #fecaca; }
    </style>
</head>
<body>
    <datalist id="events-list"></datalist>

    <div class="max-w-md">
        <div class="sticky-header">
            <header>
                <div style="color: white; font-weight: 900; font-style: italic; text-transform: uppercase; text-align: center; font-size: 1.5rem; margin-bottom:1rem;">Pickleball <span style="color: #f97316;">Matcher</span></div>
                <div id="current-match-ui"></div>
            </header>
            <div id="navigation" class="tab-bar hidden">
                <button onclick="switchTab('players')" id="nav-players" class="tab-btn tab-active">PLAYERS</button>
                <button onclick="switchTab('schedule')" id="nav-schedule" class="tab-btn">SCHEDULE</button>
                <button onclick="switchTab('leaderboard')" id="nav-leaderboard" class="tab-btn">RANKING</button>
            </div>
        </div>

        <main>
            <div id="view-setup">
                <div class="card">
                    <div style="margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px dashed #cbd5e1;">
                        <div style="font-size: 0.75rem; font-weight: 900; color: #64748b; margin-bottom: 0.5rem; text-transform: uppercase;">Event Info (For DUPR)</div>
                        <div style="display: flex; gap: 0.5rem;">
                            <input type="text" id="setup-event-name" list="events-list" placeholder="EVENT NAME" style="flex: 1; padding: 1rem; border-radius: 1rem; border: none; background: #f1f5f9; font-weight: 900; outline:none; text-transform:uppercase;">
                            <input type="date" id="setup-event-date" style="width: 140px; padding: 1rem; border-radius: 1rem; border: none; background: #f1f5f9; font-weight: 900; outline:none; text-transform:uppercase;">
                        </div>
                    </div>

                    <div class="input-block">
                        <div style="font-size: 0.75rem; font-weight: 900; color: #64748b; margin-bottom: 0.5rem; text-transform: uppercase;">ADD NEW PLAYER</div>
                        
                        <div class="autocomplete-container">
                            <input type="text" id="setup-name" onfocus="showPlayerSuggestions('setup-name', 'setup-dupr', 'setup-dropdown')" oninput="showPlayerSuggestions('setup-name', 'setup-dupr', 'setup-dropdown')" placeholder="PLAYER NAME" class="styled-input" autocomplete="off" style="margin-bottom:0; position:relative; z-index:1001;">
                            <div id="setup-dropdown" class="autocomplete-list"></div>
                        </div>

                        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                            <input type="text" id="setup-dupr" placeholder="DUPR ID (OPTIONAL)" style="flex: 1; padding: 1rem; border-radius: 0.75rem; border: none; background: white; font-weight: 900; outline:none; text-transform:uppercase;">
                            <button onclick="addPlayer('setup-name', 'setup-dupr')" style="background:#0f172a; color:white; border:none; padding: 0 1.5rem; border-radius: 0.75rem; font-weight: 900; cursor:pointer;">ADD</button>
                        </div>
                    </div>

                    <div style="font-size: 0.75rem; font-weight: 900; color: #f97316; margin-top: 1rem; text-align: center; letter-spacing: 0.05em;">⚠️ 最少需要 6 人才能開始</div>
                    <div id="setup-list" style="margin-top: 1rem; max-height:400px; overflow-y:auto; border: 1px solid #f1f5f9; border-radius: 1rem;"></div>
                </div>
                <button id="start-btn" onclick="startApp()" class="btn-orange" style="margin-top: 1.5rem;" disabled>MINIMUM 6 PLAYERS</button>
                <button onclick="resetData()" class="btn-reset">CLEAR MATCH DATA / 開啟新球聚</button>
            </div>

            <div id="view-game" class="hidden">
                <div id="tab-players-content">
                    <div id="player-stats-list" class="card" style="padding: 0; overflow: hidden;"></div>
                    
                    <div class="input-block" style="margin-top:1rem;">
                        <div class="autocomplete-container">
                            <input type="text" id="add-more-name" onfocus="showPlayerSuggestions('add-more-name', 'add-more-dupr', 'add-more-dropdown')" oninput="showPlayerSuggestions('add-more-name', 'add-more-dupr', 'add-more-dropdown')" placeholder="PLAYER NAME" class="styled-input" autocomplete="off" style="margin-bottom:0; position:relative; z-index:1001;">
                            <div id="add-more-dropdown" class="autocomplete-list"></div>
                        </div>

                        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                            <input type="text" id="add-more-dupr" placeholder="DUPR ID (OPTIONAL)" style="flex: 1; padding: 1rem; border-radius: 0.75rem; border: none; background: white; font-weight: 900; outline:none; text-transform:uppercase;">
                            <button onclick="addPlayer('add-more-name', 'add-more-dupr')" style="background:#0f172a; color:white; border:none; padding: 0 1.5rem; border-radius: 0.75rem; font-weight: 900; cursor:pointer;">ADD</button>
                        </div>
                    </div>

                    <button onclick="resetData()" class="btn-reset">CLEAR MATCH DATA / 開啟新球聚</button>
                </div>
                
                <div id="tab-schedule-content" class="hidden">
                    <button onclick="exportDUPRCSV()" class="btn-export">📥 EXPORT DUPR CSV</button>
                    <div id="schedule-list"></div>
                </div>

                <div id="tab-leaderboard-content" class="hidden">
                    <div style="text-align: center; margin-bottom: 1rem; color: #64748b; font-size: 0.75rem; font-weight: 900; text-transform: uppercase;">
                        Dynamic Rating System (Base 3.500)
                    </div>
                    <div id="leaderboard-list"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let players = JSON.parse(localStorage.getItem('pb_players')) || [];
        players = players.map(p => ({ ...p, rating: p.rating || 3.500, duprId: p.duprId || "" }));

        let matchHistory = JSON.parse(localStorage.getItem('pb_history')) || [];
        let isStarted = localStorage.getItem('pb_isStarted') === 'true';
        let partnerMatrix = JSON.parse(localStorage.getItem('pb_matrix')) || {}; 
        let nextPlayerNum = parseInt(localStorage.getItem('pb_nextNum')) || 1;
        let baseCycleLength = parseInt(localStorage.getItem('pb_baseCycle')) || 12;
        let initialSetupCount = parseInt(localStorage.getItem('pb_initialCount')) || 6;
        let activeTab = 'players';

        function getLocalYYYYMMDD() {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        document.getElementById('setup-event-name').value = localStorage.getItem('pb_eventName') || '';
        document.getElementById('setup-event-date').value = localStorage.getItem('pb_eventDate') || getLocalYYYYMMDD();

        // 更新 Event 的下拉清單
        function updateEventsList() {
            const eMem = JSON.parse(localStorage.getItem('pb_memory_events')) || [];
            const eList = document.getElementById('events-list');
            if(eList) eList.innerHTML = eMem.map(e => `<option value="${e}">`).join('');
        }
        updateEventsList();

        // 智慧下拉選單核心邏輯
        function showPlayerSuggestions(nameInputId, duprInputId, dropdownId) {
            const input = document.getElementById(nameInputId);
            const val = input.value.trim().toLowerCase();
            const dropdown = document.getElementById(dropdownId);
            const pMem = JSON.parse(localStorage.getItem('pb_memory_players')) || {};
            
            // 如果剛好有完全符合的名稱，自動填充 DUPR ID
            if (val && pMem[val] !== undefined && document.getElementById(duprInputId).value.trim() === '') {
                document.getElementById(duprInputId).value = pMem[val];
            }

            dropdown.innerHTML = '';
            // 過濾名單
            const matches = Object.keys(pMem).filter(k => k.includes(val));
            
            if (matches.length === 0) { 
                dropdown.style.display = 'none'; 
                return; 
            }

            // 建立選單 DOM
            matches.forEach(m => {
                const div = document.createElement('div');
                div.className = 'autocomplete-item';
                
                // 名字與 DUPR 顯示區塊
                const nameSpan = document.createElement('span');
                const displayName = m.charAt(0).toUpperCase() + m.slice(1);
                nameSpan.innerHTML = `${displayName} <span style="color:#94a3b8; font-size:10px; margin-left:5px;">${pMem[m] ? '('+pMem[m]+')' : ''}</span>`;
                nameSpan.style.flex = "1";
                
                // 點擊選項自動帶入資料
                nameSpan.onclick = () => {
                    input.value = displayName;
                    document.getElementById(duprInputId).value = pMem[m];
                    dropdown.style.display = 'none';
                };

                // X 刪除按鈕
                const delSpan = document.createElement('span');
                delSpan.innerHTML = '&times;'; 
                delSpan.className = 'delete-mem-btn';
                delSpan.onclick = (e) => {
                    e.stopPropagation(); // 阻止觸發選擇動作
                    if(confirm(`確定要從記憶庫中永久刪除「${displayName}」嗎？`)) {
                        delete pMem[m];
                        localStorage.setItem('pb_memory_players', JSON.stringify(pMem));
                        // 重新整理下拉選單
                        showPlayerSuggestions(nameInputId, duprInputId, dropdownId);
                    }
                };

                div.appendChild(nameSpan);
                div.appendChild(delSpan);
                dropdown.appendChild(div);
            });
            dropdown.style.display = 'block';
        }

        // 點擊空白處關閉下拉選單
        document.addEventListener('click', function(e) {
            if(!e.target.closest('.autocomplete-container')) {
                document.querySelectorAll('.autocomplete-list').forEach(el => el.style.display = 'none');
            }
        });

        const CYCLES = { 
            6: [ 
                [0,1,2,3], [0,1,4,5], [2,3,4,5], [0,1,2,3], [0,1,4,5], [2,3,4,5], 
                [0,1,2,3], [0,1,4,5], [2,3,4,5], [0,1,2,3], [0,1,4,5], [2,3,4,5]
            ],
            7: [ 
                [0,1,3,4], [1,2,4,5], [2,3,5,6], [3,4,6,0], [4,5,0,1], [5,6,1,2], [6,0,2,3],
                [0,1,3,4], [1,2,4,5], [2,3,5,6], [3,4,6,0], [4,5,0,1], [5,6,1,2], [6,0,2,3]
            ],
            8: [ 
                [0,1,2,3], [4,5,6,7], [0,1,4,5], [2,3,6,7], [0,2,4,6], [1,3,5,7], [0,3,4,7],
                [1,2,5,6], [0,1,6,7], [2,3,4,5], [0,2,5,7], [1,3,4,6], [0,3,5,6], [1,2,4,7]
            ]
        };

        function calculateMatch(pool, roundIdx, currentMatrix = partnerMatrix) {
            const active = pool.filter(p => p.isActive); 
            if (active.length < 4) return null;

            let selected;
            if (active.length === initialSetupCount && CYCLES[initialSetupCount]) {
                let sortedActive = [...active].sort((a,b) => a.playerNum - b.playerNum);
                let cyclePairing = CYCLES[initialSetupCount][roundIdx % baseCycleLength];
                selected = cyclePairing.map(index => sortedActive[index]);
            } else {
                let sorted = [...active].sort((a,b) => (a.playCount - b.playCount) || (a.consecutive - b.consecutive) || (Math.random()-0.5));
                const canPlay = sorted.filter(p => p.consecutive < 2);
                selected = (canPlay.length >= 4) ? canPlay.slice(0,4) : sorted.slice(0,4);
            }

            let best = { a: [selected[0].id, selected[1].id], b: [selected[2].id, selected[3].id], minW: 9999 };
            let combs = [[0,1,2,3], [0,2,1,3], [0,3,1,2]];
            combs.sort(() => Math.random() - 0.5); 
            combs.forEach(c => {
                let p1 = selected[c[0]].id, p2 = selected[c[1]].id, p3 = selected[c[2]].id, p4 = selected[c[3]].id;
                let w = (currentMatrix[p1]?.[p2] || 0) + (currentMatrix[p3]?.[p4] || 0);
                if(w < best.minW) best = { a: [p1,p2], b: [p3,p4], minW: w };
            });
            return { teamAIds: best.a, teamBIds: best.b, allIds: [...best.a, ...best.b] };
        }

        function saveData() { 
            localStorage.setItem('pb_players', JSON.stringify(players)); localStorage.setItem('pb_history', JSON.stringify(matchHistory));
            localStorage.setItem('pb_isStarted', isStarted); localStorage.setItem('pb_matrix', JSON.stringify(partnerMatrix));
            localStorage.setItem('pb_nextNum', nextPlayerNum); localStorage.setItem('pb_baseCycle', baseCycleLength);
            localStorage.setItem('pb_initialCount', initialSetupCount);
        }

        function resetData() { 
            if(confirm("確定要清除今天的排程與比分 (Clear Match Data)，開啟新球聚嗎？\n\n(此動作不會清除您已儲存的球員與 DUPR ID 記憶)")) { 
                localStorage.removeItem('pb_players');
                localStorage.removeItem('pb_history');
                localStorage.removeItem('pb_isStarted');
                localStorage.removeItem('pb_matrix');
                localStorage.removeItem('pb_nextNum');
                localStorage.removeItem('pb_baseCycle');
                localStorage.removeItem('pb_initialCount');
                location.reload(); 
            } 
        }

        function exportDUPRCSV() {
            let historyDones = [...matchHistory].filter(m => m.completed).sort((a,b) => a.round - b.round);
            if(historyDones.length === 0) {
                alert("目前沒有已完成的比賽可以匯出！");
                return;
            }

            let evtName = localStorage.getItem('pb_eventName') || 'Casual_Match';
            let safeEvtName = evtName.replace(/[\/\\?%*:|"<>\.]/g, '').replace(/\s+/g, '_');
            
            let rawDate = localStorage.getItem('pb_eventDate');
            let evtDate = (!rawDate || !/^\d{4}-\d{2}-\d{2}$/.test(rawDate)) ? getLocalYYYYMMDD() : rawDate;

            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
            csvContent += "<leave empty>,<leave empty>,<leave empty>,matchType,event,date,playerA1,playerA1DuprId,playerA1ExternalId,playerA2,playerA2DuprId,playerA2ExternalId,playerB1,playerB1DuprId,playerB1ExternalId,playerB2,playerB2DuprId,playerB2ExternalId,<leave empty>,teamAGame1,teamBGame1,teamAGame2,teamBGame2,teamAGame3,teamBGame3,teamAGame4,teamBGame4,teamAGame5,teamBGame5\n";
            
            historyDones.forEach(m => {
                const pA1 = players.find(p => p.id === m.teamAIds[0]) || {};
                const pA2 = players.find(p => p.id === m.teamAIds[1]) || {};
                const pB1 = players.find(p => p.id === m.teamBIds[0]) || {};
                const pB2 = players.find(p => p.id === m.teamBIds[1]) || {};
                
                const row = [
                    "", "", "", 
                    "D",        
                    evtName,    
                    evtDate,    
                    pA1.name || "Unknown", pA1.duprId || "", "",         
                    pA2.name || "Unknown", pA2.duprId || "", "",         
                    pB1.name || "Unknown", pB1.duprId || "", "",         
                    pB2.name || "Unknown", pB2.duprId || "", "",         
                    "",         
                    m.scoreA, m.scoreB,   
                    "", "", "", "", "", "", "", ""          
                ];
                
                csvContent += row.map(item => `"${item}"`).join(",") + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `DUPR_${safeEvtName}_${evtDate}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function addPlayer(nameId, duprIdId) {
            const nameInput = document.getElementById(nameId);
            const duprInput = document.getElementById(duprIdId);
            let name = nameInput.value.trim();
            let duprId = duprInput ? duprInput.value.trim().toUpperCase() : '';
            
            if(!name) return;
            if(players.some(p => p.name.toLowerCase() === name.toLowerCase())) { alert("此姓名已存在！"); return; }
            name = name.charAt(0).toUpperCase() + name.slice(1);
            
            players.push({ id: Date.now(), playerNum: nextPlayerNum++, name, duprId, playCount: 0, wins: 0, losses: 0, consecutive: 0, isActive: true, rating: 3.500 });
            
            // 存入記憶庫
            let pMem = JSON.parse(localStorage.getItem('pb_memory_players')) || {};
            if(duprId) { pMem[name.toLowerCase()] = duprId; }
            else if(!pMem[name.toLowerCase()]) { pMem[name.toLowerCase()] = ""; } 
            localStorage.setItem('pb_memory_players', JSON.stringify(pMem));

            if (!isStarted) { 
                players.forEach((p, i) => { p.playerNum = i + 1; }); 
                nextPlayerNum = players.length + 1; 
            } 
            nameInput.value = '';
            if(duprInput) duprInput.value = '';
            
            // 隱藏所有選單
            document.querySelectorAll('.autocomplete-list').forEach(el => el.style.display = 'none');
            saveData(); render();
        }

        function removePlayerSetup(id) {
            players = players.filter(p => p.id !== id);
            if (!isStarted) { 
                players.forEach((p, i) => { p.playerNum = i + 1; }); 
                nextPlayerNum = players.length + 1; 
            }
            saveData(); render();
        }

        function handleSubs(oldId) {
            const name = prompt("New Substitute Player Name (替補球員姓名):"); if (!name) return;
            const newName = name.trim();
            if(players.some(p => p.name.toLowerCase() === newName.toLowerCase() && p.isActive)) { alert("此姓名已在場上！"); return; }
            
            const pMem = JSON.parse(localStorage.getItem('pb_memory_players')) || {};
            const savedDupr = pMem[newName.toLowerCase()] || "";
            let duprPromptMsg = "DUPR ID (Optional):";
            if (savedDupr) duprPromptMsg = `系統偵測到歷史 DUPR ID 為 [${savedDupr}]，如要修改請直接輸入，否則按確定沿用：`;
            
            let duprId = prompt(duprPromptMsg, savedDupr);
            if(duprId === null) return; 
            duprId = duprId.trim().toUpperCase();

            pMem[newName.toLowerCase()] = duprId;
            localStorage.setItem('pb_memory_players', JSON.stringify(pMem));

            players = players.map(p => p.id === oldId ? { ...p, isActive: false, consecutive: 0 } : p);
            players.push({ id: Date.now(), playerNum: nextPlayerNum++, name: newName.charAt(0).toUpperCase() + newName.slice(1), duprId, playCount: 0, wins: 0, losses: 0, consecutive: 0, isActive: true, rating: 3.500 });
            
            if (isStarted && !matchHistory[0].completed) { 
                const newM = calculateMatch(players, matchHistory.length - 1, partnerMatrix);
                if(newM) matchHistory[0] = { ...matchHistory[0], ...newM }; 
            }
            saveData(); render();
        }

        function endRound() {
            const sA = Math.max(0, parseInt(document.getElementById('scA').value)), sB = Math.max(0, parseInt(document.getElementById('scB').value));
            if(isNaN(sA) || isNaN(sB)) { alert("請輸入有效比分"); return; }
            let curr = matchHistory[0]; curr.scoreA = sA; curr.scoreB = sB; curr.completed = true;
            
            const pA1 = players.find(p => p.id === curr.teamAIds[0]);
            const pA2 = players.find(p => p.id === curr.teamAIds[1]);
            const pB1 = players.find(p => p.id === curr.teamBIds[0]);
            const pB2 = players.find(p => p.id === curr.teamBIds[1]);
            
            const rA = (pA1.rating + pA2.rating) / 2;
            const rB = (pB1.rating + pB2.rating) / 2;
            const sA_result = sA > sB ? 1 : (sA < sB ? 0 : 0.5);
            const eA = 1 / (1 + Math.pow(10, (rB - rA) / 1.0)); 
            
            const pointDiff = Math.abs(sA - sB);
            const pdMult = 1 + (pointDiff / 11); 
            
            const K = 0.4; 
            const ratingChangeA = K * (sA_result - eA) * pdMult;
            const ratingChangeB = -ratingChangeA; 

            [[curr.teamAIds[0], curr.teamAIds[1]], [curr.teamBIds[0], curr.teamBIds[1]]].forEach(p => {
                if(!partnerMatrix[p[0]]) partnerMatrix[p[0]] = {}; partnerMatrix[p[0]][p[1]] = (partnerMatrix[p[0]][p[1]] || 0) + 1;
                if(!partnerMatrix[p[1]]) partnerMatrix[p[1]] = {}; partnerMatrix[p[1]][p[0]] = (partnerMatrix[p[1]][p[0]] || 0) + 1;
            });

            players = players.map(p => {
                if(!curr.allIds.includes(p.id)) return { ...p, consecutive: 0 };
                const won = (curr.teamAIds.includes(p.id) && sA > sB) || (curr.teamBIds.includes(p.id) && sB > sA);
                
                let newRating = p.rating;
                if (curr.teamAIds.includes(p.id)) newRating += ratingChangeA;
                if (curr.teamBIds.includes(p.id)) newRating += ratingChangeB;

                return { ...p, playCount: p.playCount + 1, consecutive: p.consecutive + 1, wins: p.wins + (won?1:0), losses: p.losses + (won?0:1), rating: newRating };
            });

            matchHistory.unshift({ round: curr.round + 1, completed: false, allIds: [], teamAIds: [], teamBIds: [] });
            const nextM = calculateMatch(players, matchHistory.length - 1, partnerMatrix); if(nextM) matchHistory[0] = { ...matchHistory[0], ...nextM };
            saveData(); render();
        }

        function handleEdit(round) {
            const idx = matchHistory.findIndex(m => m.round === round);
            const nA = prompt("Team A Score (注意: 修改歷史分數不會回溯重算排行榜積分):", matchHistory[idx].scoreA);
            const nB = prompt("Team B Score:", matchHistory[idx].scoreB);
            if (nA !== null && nB !== null) { matchHistory[idx].scoreA = Math.max(0, parseInt(nA)); matchHistory[idx].scoreB = Math.max(0, parseInt(nB)); saveData(); render(); }
        }

        function startApp() { 
            let evtName = document.getElementById('setup-event-name').value.trim();
            localStorage.setItem('pb_eventName', evtName);
            localStorage.setItem('pb_eventDate', document.getElementById('setup-event-date').value);

            if(evtName) {
                let eMem = JSON.parse(localStorage.getItem('pb_memory_events')) || [];
                if(!eMem.includes(evtName)) { eMem.push(evtName); localStorage.setItem('pb_memory_events', JSON.stringify(eMem)); updateEventsList(); }
            }

            initialSetupCount = players.filter(p=>p.isActive).length;
            baseCycleLength = initialSetupCount <= 6 ? 12 : 14;
            const m = calculateMatch(players, 0, partnerMatrix); 
            matchHistory.push({ round: 1, ...m, scoreA: '', scoreB: '', completed: false }); 
            isStarted = true; saveData(); render(); 
        }

        function switchTab(t) { activeTab = t; render(); }

        function render() {
            const getP = (id) => players.find(p => p.id === id) || { name: 'Gone', playerNum: '?' };
            
            if(isStarted) {
                document.getElementById('view-setup').classList.add('hidden'); 
                document.getElementById('navigation').classList.remove('hidden'); 
                document.getElementById('view-game').classList.remove('hidden');
            }

            const activeCount = players.filter(p=>p.isActive).length;
            const btnStart = document.getElementById('start-btn');
            btnStart.disabled = activeCount < 6;
            btnStart.innerText = activeCount < 6 ? 'MINIMUM 6 PLAYERS' : 'START MATCHING';
            
            document.getElementById('setup-list').innerHTML = players.map(p => `<div style="display:flex;justify-content:space-between;padding:0.75rem;border-bottom:1px solid #f1f5f9;align-items:center;"><span style="font-weight:900;">${p.playerNum}. ${p.name} <span style="font-size:10px; color:#94a3b8; margin-left:5px;">${p.duprId ? '('+p.duprId+')' : ''}</span></span><button onclick="removePlayerSetup(${p.id})" style="color:#f87171;border:none;background:none;font-size:10px;font-weight:900;cursor:pointer;">REMOVE</button></div>`).join('');

            const curr = matchHistory.find(m => !m.completed);
            const slot = document.getElementById('current-match-ui');
            if (isStarted && curr && curr.allIds.length === 4) {
                slot.innerHTML = `
                <div class="card card-live">
                    <div style="text-align: center; margin-bottom: 1.25rem;">
                        <span style="font-size: 1.1rem; font-weight: 900; background: #f97316; color: white; padding: 6px 16px; border-radius: 8px; letter-spacing: 0.05em; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">GAME ${curr.round} · LIVE</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; text-align:center; font-weight:900; margin-bottom: 0.75rem;">
                        <div style="width:45%; font-size: 1.05rem; line-height: 1.4;">${getP(curr.teamAIds[0]).name}<br>${getP(curr.teamAIds[1]).name}</div>
                        <div style="width:10%;"></div>
                        <div style="width:45%; font-size: 1.05rem; line-height: 1.4;">${getP(curr.teamBIds[0]).name}<br>${getP(curr.teamBIds[1]).name}</div>
                    </div>
                    <div style="display:flex; justify-content:center; align-items:center; gap: 1rem; margin-bottom: 1.25rem;">
                        <input type="number" id="scA" class="score-input" min="0" placeholder="0">
                        <div class="vs-orange">VS</div>
                        <input type="number" id="scB" class="score-input" min="0" placeholder="0">
                    </div>
                    <button onclick="endRound()" class="btn-orange">SUBMIT SCORE</button>
                </div>`;
            } else { slot.innerHTML = ''; }

            document.getElementById('player-stats-list').innerHTML = players.map(p => `<div style="display:flex;justify-content:space-between;padding:1rem;border-bottom:1px solid #f1f5f9;${p.isActive?'':'opacity:0.3'}">
                <div style="display:flex;flex:1;align-items:center;"><span style="font-weight:900;color:#94a3b8;min-width:1.5rem;">${p.playerNum}.</span><div style="flex:1;margin-left:0.5rem;"><div style="font-weight:900;">${p.name} <span style="font-size:10px; color:#94a3b8;">${p.duprId ? p.duprId : ''}</span> <span style="font-size:10px; color:#f97316; margin-left:3px;">(${p.rating.toFixed(3)})</span></div><div style="font-size:10px;color:#059669;font-weight:900;">W:${p.wins} L:${p.losses}</div></div><div class="stat-badge"><div style="font-size:8px;color:#94a3b8;">G</div>${p.playCount}</div></div>
                <div style="display:flex;align-items:center;margin-left:1rem;">${p.isActive ? `<button onclick="handleSubs(${p.id})" style="border:none;background:none;font-weight:900;font-size:10px;color:#3b82f6;margin-right:10px;cursor:pointer;">SUBS</button><button onclick="players=players.map(x=>x.id===${p.id}?{...x,isActive:false}:x);saveData();render();" style="border:none;background:none;font-weight:900;font-size:10px;color:#94a3b8;cursor:pointer;">DROP</button>` : `<button onclick="players=players.map(x=>x.id===${p.id}?{...x,isActive:true}:x);saveData();render();" style="border:none;background:none;font-weight:900;font-size:10px;color:#059669;cursor:pointer;">ACTIVATE</button>`}</div>
            </div>`).join('');

            let sortedPlayers = [...players].sort((a,b) => b.rating - a.rating);
            document.getElementById('leaderboard-list').innerHTML = sortedPlayers.map((p, index) => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding: 1.2rem; margin-top: 0.5rem; ${p.isActive?'':'opacity:0.6'}">
                    <div style="display:flex; align-items:center;">
                        <span style="font-weight:900; color:#64748b; font-size:1.4rem; min-width:2.5rem;">#${index+1}</span>
                        <div style="margin-left:0.5rem;">
                            <div style="font-weight:900; font-size:1.1rem; color:#0f172a;">${p.name}</div>
                            <div style="font-size:10px; color:#94a3b8; font-weight:900; margin-top: 3px;">W: ${p.wins} / L: ${p.losses}</div>
                        </div>
                    </div>
                    <div style="font-size:1.5rem; font-weight:900; color:#f97316;">
                        ${p.rating.toFixed(3)}
                    </div>
                </div>
            `).join('');

            document.getElementById('nav-players').className = `tab-btn ${activeTab==='players'?'tab-active':''}`;
            document.getElementById('nav-schedule').className = `tab-btn ${activeTab==='schedule'?'tab-active':''}`;
            document.getElementById('nav-leaderboard').className = `tab-btn ${activeTab==='leaderboard'?'tab-active':''}`;
            
            document.getElementById('tab-players-content').className = activeTab === 'players' ? '' : 'hidden';
            document.getElementById('tab-schedule-content').className = activeTab === 'schedule' ? '' : 'hidden';
            document.getElementById('tab-leaderboard-content').className = activeTab === 'leaderboard' ? '' : 'hidden';

            let schedHTML = '';
            let historyDones = [...matchHistory].filter(m => m.completed).sort((a,b) => a.round - b.round);
            
            historyDones.forEach(m => {
                schedHTML += `<div class="card card-done"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><span style="font-size:10px;color:white;font-weight:900;opacity:0.6;">GAME ${m.round}</span><div><span class="label-done">DONE</span><button onclick="handleEdit(${m.round})" style="color:white;font-size:10px;font-weight:900;border:none;background:none;text-decoration:underline;margin-left:8px;cursor:pointer;">EDIT</button></div></div>
                    <div style="display:flex;justify-content:space-between;text-align:center;font-weight:900;"><div style="width:40%;">${getP(m.teamAIds[0]).name}<br>${getP(m.teamAIds[1]).name}<div class="score-done">${m.scoreA}</div></div><div class="vs-orange">VS</div><div style="width:40%;">${getP(m.teamBIds[0]).name}<br>${getP(m.teamBIds[1]).name}<div class="score-done">${m.scoreB}</div></div></div></div>`;
            });
            
            if (curr && curr.allIds.length === 4) {
                schedHTML += `<div class="card card-live" style="border:none; border-left:4px solid #f97316; padding:1.25rem;"><div style="font-size:11px;color:#f97316;font-weight:900;margin-bottom:10px;text-align:center;letter-spacing:0.05em;">GAME ${curr.round} · LIVE NOW</div>
                    <div style="display:flex;justify-content:space-between;text-align:center;font-weight:900;"><div style="width:40%;">${getP(curr.teamAIds[0]).name}<br>${getP(curr.teamAIds[1]).name}</div><div class="vs-orange">VS</div><div style="width:40%;">${getP(curr.teamBIds[0]).name}<br>${getP(curr.teamBIds[1]).name}</div></div></div>`;
            }
            
            let tPlayers = players.map(p => ({...p}));
            let tMatrix = JSON.parse(JSON.stringify(partnerMatrix));
            let currentRoundNum = historyDones.length + (curr ? 1 : 0);
            
            let targetTotalGames = Math.ceil((currentRoundNum === 0 ? 1 : currentRoundNum) / baseCycleLength) * baseCycleLength; 
            let simRoundIdx = currentRoundNum;
            
            if(curr) { 
                curr.allIds.forEach(id => { let p = tPlayers.find(x => x.id === id); if(p){ p.playCount++; p.consecutive++; } }); 
                tPlayers.forEach(p => { if(!curr.allIds.includes(p.id)) p.consecutive = 0; }); 
                [[curr.teamAIds[0], curr.teamAIds[1]], [curr.teamBIds[0], curr.teamBIds[1]]].forEach(pair => {
                    if(!tMatrix[pair[0]]) tMatrix[pair[0]] = {}; tMatrix[pair[0]][pair[1]] = (tMatrix[pair[0]][pair[1]] || 0) + 1;
                    if(!tMatrix[pair[1]]) tMatrix[pair[1]] = {}; tMatrix[pair[1]][pair[0]] = (tMatrix[pair[1]][pair[0]] || 0) + 1;
                });
            }

            while(simRoundIdx < targetTotalGames) {
                let m = calculateMatch(tPlayers, simRoundIdx, tMatrix); if (!m) break;
                schedHTML += `<div class="card card-preview"><div style="font-size:10px;color:#94a3b8;font-weight:900;margin-bottom:10px;text-align:center;">GAME ${simRoundIdx + 1} · PREVIEW</div>
                    <div style="display:flex;justify-content:space-between;text-align:center;font-weight:900;"><div style="width:40%;">${getP(m.teamAIds[0]).name}<br>${getP(m.teamAIds[1]).name}</div><div class="vs-orange" style="opacity:0.5;">VS</div><div style="width:40%;">${getP(m.teamBIds[0]).name}<br>${getP(m.teamBIds[1]).name}</div></div></div>`;
                m.allIds.forEach(id => { let p = tPlayers.find(x => x.id === id); if(p){ p.playCount++; p.consecutive++; } });
                tPlayers.forEach(p => { if(!m.allIds.includes(p.id)) p.consecutive = 0; });
                [[m.teamAIds[0], m.teamAIds[1]], [m.teamBIds[0], m.teamBIds[1]]].forEach(pair => {
                    if(!tMatrix[pair[0]]) tMatrix[pair[0]] = {}; tMatrix[pair[0]][pair[1]] = (tMatrix[pair[0]][pair[1]] || 0) + 1;
                    if(!tMatrix[pair[1]]) tMatrix[pair[1]] = {}; tMatrix[pair[1]][pair[0]] = (tMatrix[pair[1]][pair[0]] || 0) + 1;
                });
                simRoundIdx++;
            }
            document.getElementById('schedule-list').innerHTML = schedHTML;
        }
        render();
    </script>
</body>
</html>
