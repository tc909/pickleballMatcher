<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MatchFlow - v12.7.5</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: #f8fafc; color: #0f172a; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
    .app { max-width: 28rem; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
    .sticky { position: sticky; top: 0; z-index: 50; background: #0f172a; }
    .header { padding: 1.25rem 1.25rem 1rem; border-bottom: 4px solid #f97316; }
    .brand { color: #fff; text-align: center; font-size: 1.55rem; font-weight: 900; font-style: italic; text-transform: uppercase; margin-bottom: 1rem; }
    .brand span { color: #f97316; }

    .court-bar {
      display: flex; gap: 0.4rem; padding: 0.55rem 0.75rem;
      background: #111827; border-bottom: 1px solid #334155; overflow-x: auto;
    }
    .court-pill {
      border: none; background: #1e293b; color: #cbd5e1; border-radius: 999px;
      padding: 0.8rem 1rem; font-size: 0.72rem; font-weight: 900; letter-spacing: 0.04em;
      text-transform: uppercase; white-space: nowrap; cursor: pointer;
    }
    .court-pill.active { background: #f97316; color: #fff; }
    .court-pill.add {
      background: #0f172a; border: 2px dashed #475569; color: #fff; min-width: 44px;
    }

    .tab-bar { display: flex; background: #fff; border-bottom: 1px solid #e2e8f0; }
    .tab-btn {
      flex: 1; border: none; background: transparent; padding: 1rem; cursor: pointer;
      font-size: 0.76rem; font-weight: 900; color: #94a3b8; letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .tab-btn.active { color: #f97316; border-bottom: 4px solid #f97316; }

    main { flex: 1; padding: 1rem 1.25rem 1.5rem; }

    .card {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 1.35rem;
      padding: 1rem; margin-bottom: 0.9rem;
    }
    .card.live {
      border: 2px solid #f97316;
      box-shadow: 0 10px 25px rgba(249,115,22,0.14);
    }
    .card.done { background: #0f172a; color: #fff; border-color: #1e293b; }
    .card.upcoming { background: #fff7ed; border: 1px solid #fed7aa; }

    .muted { color: #64748b; }
    .tiny {
      font-size: 0.7rem; font-weight: 900; letter-spacing: 0.05em; text-transform: uppercase;
    }
    .title { font-size: 1rem; font-weight: 900; }
    .badge {
      display: inline-block; padding: 0.25rem 0.55rem; border-radius: 999px;
      background: #fff7ed; color: #ea580c; font-size: 0.66rem; font-weight: 900; letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .vs { color: #f97316; font-size: 1.2rem; font-style: italic; font-weight: 900; }

    .btn {
      border: none; border-radius: 1rem; padding: 1rem; cursor: pointer;
      font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .btn.orange { background: #f97316; color: #fff; width: 100%; }
    .btn.dark { background: #0f172a; color: #fff; }
    .btn.green { background: #10b981; color: #fff; width: 100%; }
    .btn.red { background: #dc2626; color: #fff; width: 100%; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .input-block { background: #e2e8f0; padding: 1rem; border-radius: 1rem; margin-bottom: 1rem; }
    .input, .select {
      width: 100%; border: none; outline: none; background: #fff; color: #0f172a;
      border-radius: 0.8rem; padding: 1rem; font-weight: 900; text-transform: uppercase;
    }
    .input-row { display: flex; gap: 0.5rem; margin-top: 0.5rem; }

    .autocomplete { position: relative; }
    .autocomplete-list {
      position: absolute; top: calc(100% - 0.15rem); left: 0; right: 0; z-index: 100;
      background: #fff; border: 2px solid #e2e8f0; border-top: none; border-radius: 0 0 0.8rem 0.8rem;
      max-height: 220px; overflow-y: auto; display: none;
      box-shadow: 0 10px 15px rgba(0,0,0,0.08);
    }
    .autocomplete-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.85rem 1rem; border-bottom: 1px solid #f1f5f9; cursor: pointer;
      font-weight: 700; font-size: 0.85rem;
    }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover { background: #f8fafc; }
    .danger-x {
      color: #ef4444; font-size: 1.35rem; font-weight: 900; line-height: 1;
      padding: 0 0.35rem; border-radius: 999px;
    }
    .danger-x:hover { background: #fee2e2; }

    .row { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; }
    .row.wrap { flex-wrap: wrap; }

    .player-row {
      display: flex; align-items: center; justify-content: space-between; gap: 0.75rem;
      padding: 1rem; border-bottom: 1px solid #f1f5f9;
    }
    .player-row:last-child { border-bottom: none; }

    .player-left {
      display: flex; align-items: flex-start; gap: 0.85rem; min-width: 0;
    }
    .player-number {
      min-width: 2rem;
      font-size: 1.1rem;
      font-weight: 900;
      color: #64748b;
      line-height: 1.2;
      padding-top: 0.05rem;
    }

    .small-btn {
      border: none; background: none; cursor: pointer; font-size: 0.68rem;
      font-weight: 900; text-transform: uppercase;
    }
    .small-btn.dark { color: #0f172a; }
    .small-btn.red { color: #f87171; }

    .small-select {
      border: none; background: #f1f5f9; color: #0f172a; border-radius: 0.75rem;
      padding: 0.55rem 0.7rem; font-weight: 900;
    }

    .score-box {
      width: 4.5rem; height: 4.5rem; border: 2px solid transparent; outline: none;
      background: #f1f5f9; border-radius: 1rem; text-align: center;
      font-size: 1.45rem; font-weight: 900;
    }
    .score-box:focus { border-color: #f97316; }

    .toggle-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .toggle-btn {
      flex: 1; border: none; border-radius: 1rem; padding: 0.9rem 1rem; cursor: pointer;
      background: #e2e8f0; color: #475569; font-weight: 900; font-size: 0.72rem;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .toggle-btn.active { background: #0f172a; color: #fff; }

    .hidden { display: none !important; }
    .center { text-align: center; }
  </style>
</head>
<body>
  <datalist id="events-list"></datalist>

  <div class="app">
    <div class="sticky">
      <div class="header">
        <div class="brand">Match<span>Flow</span></div>
        <div id="current-match-ui"></div>
      </div>

      <div id="court-bar" class="court-bar"></div>

      <div class="tab-bar">
        <button id="tab-players" class="tab-btn active" onclick="switchTab('players')">Players</button>
        <button id="tab-schedule" class="tab-btn" onclick="switchTab('schedule')">Schedule</button>
        <button id="tab-leaderboard" class="tab-btn" onclick="switchTab('leaderboard')">Leaderboard</button>
      </div>
    </div>

    <main>
      <section id="view-players">
        <div id="player-list-card" class="card" style="padding:0; overflow:hidden;"></div>

        <div class="input-block">
          <div id="active-court-add-label" class="tiny muted" style="margin-bottom:0.5rem;"></div>

          <div class="autocomplete">
            <input
              id="add-name"
              class="input"
              type="text"
              placeholder="PLAYER NAME"
              autocomplete="off"
              onfocus="showPlayerSuggestions('add-name','add-dupr','add-dropdown')"
              oninput="showPlayerSuggestions('add-name','add-dupr','add-dropdown')"
            />
            <div id="add-dropdown" class="autocomplete-list"></div>
          </div>

          <div class="input-row">
            <input id="add-dupr" class="input" type="text" placeholder="DUPR ID (OPTIONAL)" />
            <button class="btn dark" style="padding:0 1.2rem;" onclick="addPlayer()">Add</button>
          </div>
        </div>

        <button class="btn red" style="width:100%;" onclick="clearData()">Clear Data</button>
      </section>

      <section id="view-schedule" class="hidden">
        <div id="schedule-list"></div>
      </section>

      <section id="view-leaderboard" class="hidden">
        <div id="leaderboard-meta"></div>
        <div id="leaderboard-list"></div>
      </section>
    </main>
  </div>

  <script>
    const MAX_COURTS = 6;
    const DEFAULT_RATING = 3.5;
    const UPCOMING_PREVIEW_COUNT = 8;

    const FIXED_MATCH_MATRIX = {
      5: [
        { teamA: [0,1], teamB: [2,3] },
        { teamA: [0,2], teamB: [1,4] },
        { teamA: [0,3], teamB: [2,4] },
        { teamA: [0,4], teamB: [1,3] },
        { teamA: [1,2], teamB: [3,4] },
        { teamA: [0,1], teamB: [2,3] },
        { teamA: [0,2], teamB: [1,4] },
        { teamA: [0,3], teamB: [2,4] },
        { teamA: [0,4], teamB: [1,3] },
        { teamA: [1,2], teamB: [3,4] },
        { teamA: [0,1], teamB: [2,3] },
        { teamA: [0,2], teamB: [1,4] },
        { teamA: [0,3], teamB: [2,4] },
        { teamA: [0,4], teamB: [1,3] }
      ],
      6: [
        { teamA: [0,1], teamB: [2,3] },
        { teamA: [0,4], teamB: [1,5] },
        { teamA: [2,4], teamB: [3,5] },
        { teamA: [0,2], teamB: [1,3] },
        { teamA: [0,5], teamB: [1,4] },
        { teamA: [2,5], teamB: [3,4] },
        { teamA: [0,3], teamB: [1,2] },
        { teamA: [0,1], teamB: [4,5] },
        { teamA: [2,3], teamB: [4,5] },
        { teamA: [0,3], teamB: [1,2] },
        { teamA: [0,5], teamB: [1,4] },
        { teamA: [2,5], teamB: [3,4] },
        { teamA: [0,2], teamB: [1,3] },
        { teamA: [0,4], teamB: [1,5] }
      ],
      7: [
        { teamA: [0,1], teamB: [2,3] },
        { teamA: [0,4], teamB: [5,6] },
        { teamA: [1,2], teamB: [3,4] },
        { teamA: [0,5], teamB: [1,6] },
        { teamA: [0,3], teamB: [2,4] },
        { teamA: [1,5], teamB: [2,6] },
        { teamA: [0,6], teamB: [1,3] },
        { teamA: [0,2], teamB: [4,5] },
        { teamA: [1,4], teamB: [3,6] },
        { teamA: [0,3], teamB: [2,5] },
        { teamA: [1,2], teamB: [4,6] },
        { teamA: [0,4], teamB: [3,5] },
        { teamA: [0,2], teamB: [1,6] },
        { teamA: [3,4], teamB: [5,6] }
      ],
      8: [
        { teamA: [0,1], teamB: [2,3] },
        { teamA: [4,5], teamB: [6,7] },
        { teamA: [0,2], teamB: [1,3] },
        { teamA: [4,6], teamB: [5,7] },
        { teamA: [0,3], teamB: [1,2] },
        { teamA: [4,7], teamB: [5,6] },
        { teamA: [0,4], teamB: [1,5] },
        { teamA: [2,6], teamB: [3,7] },
        { teamA: [0,5], teamB: [1,4] },
        { teamA: [2,7], teamB: [3,6] },
        { teamA: [0,6], teamB: [1,7] },
        { teamA: [2,4], teamB: [3,5] },
        { teamA: [0,7], teamB: [1,6] },
        { teamA: [2,5], teamB: [3,4] }
      ]
    };

    const STORAGE_KEYS = {
      state: 'pickleMatchV12_7_5_state',
      memoryPlayers: 'pickleMatchV12_7_5_memoryPlayers'
    };

    let state = loadState();

    function createCourt(index = 1) {
      const id = Date.now() + Math.random();
      return {
        id,
        name: `Court ${index}`,
        eventName: `Event ${index}`,
        eventDate: getLocalYYYYMMDD(),
        scoreType: 'RALLY',
        players: [],
        completedMatches: [],
        currentMatch: null,
        roundCounter: 1,
        futureMatches: [],
        pairingHistory: {},
        matchupHistory: {},
        recentAppearances: {},
        matchHistory: [],
        editTargetRound: null
      };
    }

    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEYS.state);
        if (saved) {
          const parsed = JSON.parse(saved);
          if (parsed?.courts?.length) {
            if (!parsed.leaderboardMode) parsed.leaderboardMode = 'court';
            return parsed;
          }
        }
      } catch (e) {}

      const firstCourt = createCourt(1);
      return {
        activeTab: 'players',
        activeCourtId: firstCourt.id,
        leaderboardMode: 'court',
        courts: [firstCourt]
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEYS.state, JSON.stringify(state));
    }

    function loadMemoryPlayers() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEYS.memoryPlayers) || '[]');
      } catch (e) {
        return [];
      }
    }

    function saveMemoryPlayers(players) {
      localStorage.setItem(STORAGE_KEYS.memoryPlayers, JSON.stringify(players));
    }

    function getMemoryPlayers() {
      return loadMemoryPlayers();
    }

    function toTitleCase(str) {
      return String(str || '')
        .trim()
        .toLowerCase()
        .replace(/\s+/g, ' ')
        .split(' ')
        .map(word => word ? word.charAt(0).toUpperCase() + word.slice(1) : '')
        .join(' ');
    }

    function upsertMemoryPlayer(name, duprId = '') {
      const trimmed = toTitleCase(name || '');
      if (!trimmed) return;

      const list = getMemoryPlayers();
      const key = trimmed.toLowerCase();
      const existing = list.find(p => p.name.toLowerCase() === key);

      if (existing) {
        existing.name = trimmed;
        if (duprId !== undefined) existing.duprId = (duprId || '').trim();
      } else {
        list.push({ name: trimmed, duprId: (duprId || '').trim() });
      }

      list.sort((a, b) => a.name.localeCompare(b.name));
      saveMemoryPlayers(list);
      updateEventsList();
    }

    function deleteMemoryPlayer(name) {
      const key = (name || '').trim().toLowerCase();
      const filtered = getMemoryPlayers().filter(p => p.name.toLowerCase() !== key);
      saveMemoryPlayers(filtered);
      updateEventsList();
    }

    function updateEventsList() {
      const dl = document.getElementById('events-list');
      if (!dl) return;
      const events = [...new Set(state.courts.map(c => c.eventName).filter(Boolean))];
      dl.innerHTML = events.map(ev => `<option value="${escapeHtml(ev)}"></option>`).join('');
    }

    function getCourtById(id) {
      return state.courts.find(c => c.id === id);
    }

    function getSelectedCourt() {
      return getCourtById(state.activeCourtId) || state.courts[0];
    }

    function getPlayerById(court, playerId) {
      return court.players.find(p => p.id === playerId);
    }

    function getActivePlayers(court) {
      return court.players.filter(p => p.isActive !== false);
    }

    function getCompletedMatches(court) {
      return court.completedMatches || [];
    }

    function getLocalYYYYMMDD() {
      const now = new Date();
      const tzOffset = now.getTimezoneOffset() * 60000;
      return new Date(now - tzOffset).toISOString().slice(0, 10);
    }

    function switchTab(tab) {
      state.activeTab = tab;
      saveState();
      renderApp();
    }

    function switchCourt(courtId) {
      state.activeCourtId = courtId;
      saveState();
      renderApp();
    }

    function addCourt() {
      if (state.courts.length >= MAX_COURTS) {
        alert(`Maximum ${MAX_COURTS} courts allowed.`);
        return;
      }

      const newCourt = createCourt(state.courts.length + 1);
      state.courts.push(newCourt);
      state.activeCourtId = newCourt.id;
      saveState();
      renderApp();
    }

    function clearData() {
      const ok = confirm('Clear all current event data? Player Name and DUPR ID memory will be kept.');
      if (!ok) return;

      const preservedMemory = getMemoryPlayers();
      const firstCourt = createCourt(1);

      state = {
        activeTab: 'players',
        activeCourtId: firstCourt.id,
        leaderboardMode: 'court',
        courts: [firstCourt]
      };

      saveMemoryPlayers(preservedMemory);
      saveState();
      updateEventsList();
      renderApp();
    }

    function editCourtEventName() {
      const court = getSelectedCourt();
      const nextName = prompt('Edit Event Name', court.eventName || court.name);
      if (nextName === null) return;
      court.eventName = (nextName || '').trim() || court.name;
      saveState();
      updateEventsList();
      renderApp();
    }

    function updateCourtScoreType(value) {
      const court = getSelectedCourt();
      court.scoreType = value || 'RALLY';
      saveState();
      renderApp();
    }

    function toggleLeaderboardMode(mode) {
      state.leaderboardMode = mode;
      saveState();
      renderApp();
    }

    function escapeHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function showPlayerSuggestions(nameInputId, duprInputId, dropdownId) {
      const nameInput = document.getElementById(nameInputId);
      const duprInput = document.getElementById(duprInputId);
      const dropdown = document.getElementById(dropdownId);
      const query = (nameInput.value || '').trim().toLowerCase();

      const activeNames = new Set(state.courts.flatMap(c => c.players.map(p => p.name.toLowerCase())));
      const list = getMemoryPlayers()
        .filter(p => !activeNames.has(p.name.toLowerCase()))
        .filter(p => !query || p.name.toLowerCase().includes(query));

      if (!list.length) {
        dropdown.style.display = 'none';
        dropdown.innerHTML = '';
        return;
      }

      dropdown.innerHTML = list.map(player => `
        <div class="autocomplete-item">
          <div onclick="selectMemoryPlayerAndAdd('${escapeHtml(player.name)}', '${escapeHtml(player.duprId || '')}', '${nameInputId}', '${duprInputId}', '${dropdownId}')">
            ${escapeHtml(player.name)}${player.duprId ? ` <span class="muted">· ${escapeHtml(player.duprId)}</span>` : ''}
          </div>
          <div class="danger-x" onclick="event.stopPropagation(); deleteMemoryPlayer('${escapeHtml(player.name)}'); showPlayerSuggestions('${nameInputId}','${duprInputId}','${dropdownId}');">×</div>
        </div>
      `).join('');

      dropdown.style.display = 'block';
      if (duprInput) duprInput.value = '';
    }

    function hideAutocompleteLists() {
      document.querySelectorAll('.autocomplete-list').forEach(el => {
        el.style.display = 'none';
      });
    }

    function selectMemoryPlayerAndAdd(name, duprId, nameInputId, duprInputId, dropdownId) {
      document.getElementById(nameInputId).value = name;
      document.getElementById(duprInputId).value = duprId || '';
      document.getElementById(dropdownId).style.display = 'none';
    }

    function addPlayer() {
      const court = getSelectedCourt();
      const nameInput = document.getElementById('add-name');
      const duprInput = document.getElementById('add-dupr');

      const name = toTitleCase((nameInput.value || '').trim());
      const duprId = (duprInput.value || '').trim();

      if (!name) return;

      const duplicate = court.players.some(p => p.name.toLowerCase() === name.toLowerCase());
      if (duplicate) {
        alert('Player already exists on this court.');
        return;
      }

      court.players.push({
        id: Date.now() + Math.random(),
        name,
        duprId,
        rating: DEFAULT_RATING,
        wins: 0,
        losses: 0,
        isActive: true
      });

      upsertMemoryPlayer(name, duprId);

      nameInput.value = '';
      duprInput.value = '';
      hideAutocompleteLists();

      ensureMatchExists(court);
      saveState();
      renderApp();
    }

    function editPlayer(playerId) {
      const court = getSelectedCourt();
      const player = getPlayerById(court, playerId);
      if (!player) return;

      const nextName = prompt('Edit Player Name', player.name);
      if (nextName === null) return;

      const trimmedName = toTitleCase(nextName.trim());
      if (!trimmedName) return;

      const duprId = prompt('Edit DUPR ID', player.duprId || '');
      if (duprId === null) return;

      player.name = trimmedName;
      player.duprId = duprId.trim();
      upsertMemoryPlayer(player.name, player.duprId);

      saveState();
      renderApp();
    }

    function movePlayerToCourt(playerId, targetCourtId) {
      const fromCourt = getSelectedCourt();
      const toCourt = getCourtById(Number(targetCourtId));
      if (!fromCourt || !toCourt || fromCourt.id === toCourt.id) return;

      const playerIndex = fromCourt.players.findIndex(p => p.id === playerId);
      if (playerIndex < 0) return;

      const player = fromCourt.players[playerIndex];
      const nameConflict = toCourt.players.some(p => p.name.toLowerCase() === player.name.toLowerCase());
      if (nameConflict) {
        alert('A player with the same name already exists on that court.');
        return;
      }

      fromCourt.players.splice(playerIndex, 1);
      player.isActive = true;
      toCourt.players.push(player);

      rebuildCourtScheduling(fromCourt);
      ensureMatchExists(toCourt);

      saveState();
      renderApp();
    }

    function handleDrop(playerId) {
      const court = getSelectedCourt();
      const player = getPlayerById(court, playerId);
      if (!player) return;
      player.isActive = false;
      rebuildCourtScheduling(court);
      saveState();
      renderApp();
    }

    function handleActivate(playerId) {
      const court = getSelectedCourt();
      const player = getPlayerById(court, playerId);
      if (!player) return;
      player.isActive = true;
      ensureMatchExists(court);
      saveState();
      renderApp();
    }

    function removePlayerPermanently(playerId) {
      const court = getSelectedCourt();
      const idx = court.players.findIndex(p => p.id === playerId);
      if (idx < 0) return;
      court.players.splice(idx, 1);
      rebuildCourtScheduling(court);
      saveState();
      renderApp();
    }

    function ensureMatchExists(court) {
      if (court.currentMatch) return;
      const activePlayers = getActivePlayers(court);
      if (activePlayers.length < 4) return;

      const nextMatch = getNextMatch(court);
      if (nextMatch) {
        court.currentMatch = nextMatch;
      }
    }

    function rebuildCourtScheduling(court) {
      court.completedMatches = (court.completedMatches || []).filter(match =>
        match.teamAIds.every(id => getPlayerById(court, id)?.isActive !== false) &&
        match.teamBIds.every(id => getPlayerById(court, id)?.isActive !== false)
      );

      if (court.currentMatch) {
        const allIds = [...court.currentMatch.teamAIds, ...court.currentMatch.teamBIds];
        const valid = allIds.every(id => getPlayerById(court, id)?.isActive !== false);
        if (!valid) court.currentMatch = null;
      }

      court.futureMatches = [];
      court.pairingHistory = {};
      court.matchupHistory = {};
      court.recentAppearances = {};
      court.matchHistory = [];
      court.roundCounter = 1;
      court.editTargetRound = null;

      for (const match of court.completedMatches) {
        applySchedulingHistory(court, match);
        court.roundCounter = Math.max(court.roundCounter, match.round + 1);
      }

      if (court.currentMatch) {
        applySchedulingHistory(court, court.currentMatch);
        court.roundCounter = Math.max(court.roundCounter, court.currentMatch.round + 1);
      } else {
        ensureMatchExists(court);
      }
    }

    function incrementMapCounter(map, key, amount = 1) {
      map[key] = (map[key] || 0) + amount;
    }

    function pairKey(a, b) {
      return [a, b].sort((x, y) => x - y).join('_');
    }

    function matchupKey(teamAIds, teamBIds) {
      const sideA = [...teamAIds].sort((a, b) => a - b).join('-');
      const sideB = [...teamBIds].sort((a, b) => a - b).join('-');
      return [sideA, sideB].sort().join('__');
    }

    function applySchedulingHistory(court, match) {
      const participants = [...match.teamAIds, ...match.teamBIds];
      court.matchHistory.push({ round: match.round, players: participants });

      participants.forEach(id => {
        court.recentAppearances[id] = (court.recentAppearances[id] || 0) + 1;
      });

      incrementMapCounter(court.pairingHistory, pairKey(match.teamAIds[0], match.teamAIds[1]));
      incrementMapCounter(court.pairingHistory, pairKey(match.teamBIds[0], match.teamBIds[1]));
      incrementMapCounter(court.matchupHistory, matchupKey(match.teamAIds, match.teamBIds));
    }

    function getConsecutiveCount(court, playerId) {
      let count = 0;
      for (let i = court.matchHistory.length - 1; i >= 0; i--) {
        const played = court.matchHistory[i].players.includes(playerId);
        if (!played) break;
        count++;
      }
      return count;
    }

    function getFixedMatrixMatch(court) {
      const activePlayers = getActivePlayers(court);
      const matrix = FIXED_MATCH_MATRIX[activePlayers.length];
      if (!matrix) return null;

      const completedCount = getCompletedMatches(court).length;
      if (completedCount >= matrix.length) return null;
      if (court.currentMatch) return null;

      const spec = matrix[completedCount];
      return {
        round: court.roundCounter++,
        teamAIds: [activePlayers[spec.teamA[0]].id, activePlayers[spec.teamA[1]].id],
        teamBIds: [activePlayers[spec.teamB[0]].id, activePlayers[spec.teamB[1]].id],
        scoreA: null,
        scoreB: null
      };
    }

    function combinations(arr, k) {
      const result = [];
      function backtrack(start, combo) {
        if (combo.length === k) {
          result.push([...combo]);
          return;
        }
        for (let i = start; i < arr.length; i++) {
          combo.push(arr[i]);
          backtrack(i + 1, combo);
          combo.pop();
        }
      }
      backtrack(0, []);
      return result;
    }

    function buildCandidateMatch(court, teamA, teamB) {
      const participants = [...teamA, ...teamB];
      const consecutivePenalty = participants.reduce((sum, id) => {
        const count = getConsecutiveCount(court, id);
        return sum + (count >= 2 ? 1000 : count * 20);
      }, 0);

      const pairPenalty =
        (court.pairingHistory[pairKey(teamA[0], teamA[1])] || 0) * 200 +
        (court.pairingHistory[pairKey(teamB[0], teamB[1])] || 0) * 200;

      const matchupPenalty =
        (court.matchupHistory[matchupKey(teamA, teamB)] || 0) * 60;

      const usagePenalty = participants.reduce((sum, id) => sum + (court.recentAppearances[id] || 0), 0);

      return {
        score: consecutivePenalty + pairPenalty + matchupPenalty + usagePenalty,
        round: court.roundCounter,
        teamAIds: [...teamA],
        teamBIds: [...teamB],
        scoreA: null,
        scoreB: null
      };
    }

    function getGeneratedMatch(court) {
      const activePlayers = getActivePlayers(court).map(p => p.id);
      if (activePlayers.length < 4) return null;

      const allTeams = combinations(activePlayers, 2);
      let best = null;

      for (let i = 0; i < allTeams.length; i++) {
        for (let j = i + 1; j < allTeams.length; j++) {
          const teamA = allTeams[i];
          const teamB = allTeams[j];
          const unique = new Set([...teamA, ...teamB]);
          if (unique.size !== 4) continue;

          const candidate = buildCandidateMatch(court, teamA, teamB);
          if (!best || candidate.score < best.score) best = candidate;
        }
      }

      if (!best) return null;
      best.round = court.roundCounter++;
      return best;
    }

    function getNextMatch(court) {
      const fixed = getFixedMatrixMatch(court);
      if (fixed) return fixed;
      return getGeneratedMatch(court);
    }

    function getUpcomingMatchesPreview(court, count = 8) {
      const clone = JSON.parse(JSON.stringify(court));
      clone.players = court.players.map(p => ({ ...p }));
      clone.currentMatch = court.currentMatch ? { ...court.currentMatch } : null;
      clone.completedMatches = (court.completedMatches || []).map(m => ({ ...m }));
      clone.futureMatches = [];
      clone.pairingHistory = JSON.parse(JSON.stringify(court.pairingHistory || {}));
      clone.matchupHistory = JSON.parse(JSON.stringify(court.matchupHistory || {}));
      clone.recentAppearances = JSON.parse(JSON.stringify(court.recentAppearances || {}));
      clone.matchHistory = (court.matchHistory || []).map(m => ({ ...m }));

      const preview = [];
      let virtualCurrent = clone.currentMatch ? { ...clone.currentMatch } : null;

      if (virtualCurrent) preview.push(virtualCurrent);

      while (preview.length < count) {
        const next = getNextMatch(clone);
        if (!next) break;
        preview.push(next);
        applySchedulingHistory(clone, next);
      }

      return preview;
    }

    function expectedScore(teamRatingA, teamRatingB) {
      return 1 / (1 + Math.pow(10, (teamRatingB - teamRatingA) / 0.6));
    }

    function updateRatings(court, match) {
      const teamAPlayers = match.teamAIds.map(id => getPlayerById(court, id)).filter(Boolean);
      const teamBPlayers = match.teamBIds.map(id => getPlayerById(court, id)).filter(Boolean);
      if (teamAPlayers.length !== 2 || teamBPlayers.length !== 2) return;

      const ratingA = (teamAPlayers[0].rating + teamAPlayers[1].rating) / 2;
      const ratingB = (teamBPlayers[0].rating + teamBPlayers[1].rating) / 2;

      const expA = expectedScore(ratingA, ratingB);
      const expB = expectedScore(ratingB, ratingA);

      const actualA = match.scoreA > match.scoreB ? 1 : 0;
      const actualB = match.scoreB > match.scoreA ? 1 : 0;

      const pointDiff = Math.abs(match.scoreA - match.scoreB);
      const diffFactor = 1 + pointDiff / 11;
      const k = 0.3;

      const deltaA = k * diffFactor * (actualA - expA);
      const deltaB = k * diffFactor * (actualB - expB);

      teamAPlayers.forEach(player => {
        player.rating = Number((player.rating + deltaA).toFixed(3));
        if (actualA > actualB) player.wins = (player.wins || 0) + 1;
        else player.losses = (player.losses || 0) + 1;
      });

      teamBPlayers.forEach(player => {
        player.rating = Number((player.rating + deltaB).toFixed(3));
        if (actualB > actualA) player.wins = (player.wins || 0) + 1;
        else player.losses = (player.losses || 0) + 1;
      });
    }

    function rollbackRatings(court, match) {
      const teamAPlayers = match.teamAIds.map(id => getPlayerById(court, id)).filter(Boolean);
      const teamBPlayers = match.teamBIds.map(id => getPlayerById(court, id)).filter(Boolean);
      if (teamAPlayers.length !== 2 || teamBPlayers.length !== 2) return;

      const ratingA = (teamAPlayers[0].rating + teamAPlayers[1].rating) / 2;
      const ratingB = (teamBPlayers[0].rating + teamBPlayers[1].rating) / 2;

      const expA = expectedScore(ratingA, ratingB);
      const expB = expectedScore(ratingB, ratingA);

      const actualA = match.scoreA > match.scoreB ? 1 : 0;
      const actualB = match.scoreB > match.scoreA ? 1 : 0;

      const pointDiff = Math.abs(match.scoreA - match.scoreB);
      const diffFactor = 1 + pointDiff / 11;
      const k = 0.3;

      const deltaA = k * diffFactor * (actualA - expA);
      const deltaB = k * diffFactor * (actualB - expB);

      teamAPlayers.forEach(player => {
        player.rating = Number((player.rating - deltaA).toFixed(3));
        if (actualA > actualB) player.wins = Math.max(0, (player.wins || 0) - 1);
        else player.losses = Math.max(0, (player.losses || 0) - 1);
      });

      teamBPlayers.forEach(player => {
        player.rating = Number((player.rating - deltaB).toFixed(3));
        if (actualB > actualA) player.wins = Math.max(0, (player.wins || 0) - 1);
        else player.losses = Math.max(0, (player.losses || 0) - 1);
      });
    }

    function submitScoreAction(scoreA, scoreB) {
      const court = getSelectedCourt();
      if (!court.currentMatch) return;

      const a = Number(scoreA);
      const b = Number(scoreB);

      if (!Number.isInteger(a) || !Number.isInteger(b)) {
        alert('Please enter valid integer scores.');
        return;
      }
      if (a < 0 || b < 0) {
        alert('Scores cannot be negative.');
        return;
      }
      if (a === b) {
        alert('Scores cannot be tied.');
        return;
      }

      court.currentMatch.scoreA = a;
      court.currentMatch.scoreB = b;

      updateRatings(court, court.currentMatch);

      const finalized = { ...court.currentMatch };
      court.completedMatches.push(finalized);
      court.currentMatch = null;

      ensureMatchExists(court);

      saveState();
      renderApp();
    }

    function handleEdit(round) {
      const court = getSelectedCourt();
      const match = court.completedMatches.find(m => m.round === round);
      if (!match) return;

      rollbackRatings(court, match);
      court.completedMatches = court.completedMatches.filter(m => m.round !== round);
      court.currentMatch = { ...match };
      rebuildCourtScheduling(court);

      saveState();
      renderApp();
    }

    function exportDUPRCSV() {
      const rows = [];
      rows.push([
        '<leave empty>','<leave empty>','<leave empty>',
        'matchType','scoreType','event','date',
        'playerA1','playerA1DuprId','playerA1ExternalId',
        'playerA2','playerA2DuprId','playerA2ExternalId',
        'playerB1','playerB1DuprId','playerB1ExternalId',
        'playerB2','playerB2DuprId','playerB2ExternalId',
        '<leave empty>',
        'teamAGame1','teamBGame1','teamAGame2','teamBGame2',
        'teamAGame3','teamBGame3','teamAGame4','teamBGame4','teamAGame5','teamBGame5'
      ]);

      state.courts.forEach(court => {
        getCompletedMatches(court).forEach(match => {
          const pA1 = getPlayerById(court, match.teamAIds[0]) || {};
          const pA2 = getPlayerById(court, match.teamAIds[1]) || {};
          const pB1 = getPlayerById(court, match.teamBIds[0]) || {};
          const pB2 = getPlayerById(court, match.teamBIds[1]) || {};

          rows.push([
            '', '', '',
            'D',
            court.scoreType || 'RALLY',
            court.eventName || court.name,
            court.eventDate || getLocalYYYYMMDD(),
            pA1.name || '', pA1.duprId || '', '',
            pA2.name || '', pA2.duprId || '', '',
            pB1.name || '', pB1.duprId || '', '',
            pB2.name || '', pB2.duprId || '', '',
            '',
            match.scoreA ?? '', match.scoreB ?? '',
            '', '', '', '', '', '', '', ''
          ]);
        });
      });

      if (rows.length === 1) {
        alert('No completed matches to export.');
        return;
      }

      const csv = '\uFEFF' + rows.map(row =>
        row.map(value => `"${String(value ?? '').replace(/"/g, '""')}"`).join(',')
      ).join('\n');

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement('a');
      anchor.href = url;
      anchor.download = `DUPR_${(getSelectedCourt().eventName || 'Event').replace(/[\/\\?%*:|"<>]/g, '_')}_${getLocalYYYYMMDD()}.csv`;
      document.body.appendChild(anchor);
      anchor.click();
      document.body.removeChild(anchor);
      URL.revokeObjectURL(url);
    }

              </div>
            </div>
            <div style="font-size:1.45rem; font-weight:900; color:#f97316;">${(player.rating || DEFAULT_RATING).toFixed(3)}</div>
          </div>
        </div>
      `).join('') || `<div class="card center muted" style="font-weight:900;">No leaderboard data available.</div>`;
    }

    function renderTabs() {
      document.getElementById('tab-players').classList.toggle('active', state.activeTab === 'players');
      document.getElementById('tab-schedule').classList.toggle('active', state.activeTab === 'schedule');
      document.getElementById('tab-leaderboard').classList.toggle('active', state.activeTab === 'leaderboard');

      document.getElementById('view-players').classList.toggle('hidden', state.activeTab !== 'players');
      document.getElementById('view-schedule').classList.toggle('hidden', state.activeTab !== 'schedule');
      document.getElementById('view-leaderboard').classList.toggle('hidden', state.activeTab !== 'leaderboard');
    }

    function renderApp() {
      if (!getCourtById(state.activeCourtId)) {
        state.activeCourtId = state.courts[0]?.id;
      }

      renderCourtBar();
      renderCurrentMatch();
      renderPlayersTab();
      renderScheduleTab();
      renderLeaderboardTab();
      renderTabs();
    }

    document.addEventListener('click', event => {
      if (!event.target.closest('.autocomplete')) {
        hideAutocompleteLists();
      }
    });

    window.switchTab = switchTab;
    window.switchCourt = switchCourt;
    window.toggleLeaderboardMode = toggleLeaderboardMode;
    window.updateCourtScoreType = updateCourtScoreType;
    window.editCourtEventName = editCourtEventName;
    window.showPlayerSuggestions = showPlayerSuggestions;
    window.selectMemoryPlayerAndAdd = selectMemoryPlayerAndAdd;
    window.deleteMemoryPlayer = deleteMemoryPlayer;
    window.addPlayer = addPlayer;
    window.editPlayer = editPlayer;
    window.movePlayerToCourt = movePlayerToCourt;
    window.handleDrop = handleDrop;
    window.handleActivate = handleActivate;
    window.removePlayerPermanently = removePlayerPermanently;
    window.submitScoreAction = submitScoreAction;
    window.handleEdit = handleEdit;
    window.exportDUPRCSV = exportDUPRCSV;
    window.clearData = clearData;
    window.addCourt = addCourt;

    updateEventsList();
    saveState();
    renderApp();
  </script>
</body>
</html>
