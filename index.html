<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pickleball Matcher Beta_8.41</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #f8fafc; min-height: 100vh; color: #0f172a; -webkit-tap-highlight-color: transparent; }
        .max-w-md { max-width: 28rem; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #0f172a; padding: 2rem 1.5rem 1.5rem; border-bottom: 4px solid #f97316; position: sticky; top: 0; z-index: 30; }
        .tab-bar { display: flex; background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 220px; z-index: 20; }
        .tab-btn { flex: 1; padding: 1rem; font-size: 0.75rem; font-weight: 900; border: none; background: none; color: #94a3b8; letter-spacing: 0.1em; cursor: pointer; }
        .tab-active { border-bottom: 4px solid #f97316; color: #f97316; }
        .card { background: white; border-radius: 2rem; padding: 1.5rem; margin-top: 1rem; border: 1px solid #e2e8f0; }
        .preview-card { background: #1e293b; color: #94a3b8; border-color: #334155; opacity: 0.6; }
        .score-input { width: 2.5rem; height: 2.5rem; text-align: center; background: #f1f5f9; border-radius: 0.75rem; border: 2px solid transparent; font-weight: 900; font-size: 1.25rem; }
        .btn-orange { background: #f97316; color: white; border: none; padding: 1.25rem; border-radius: 1.5rem; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; }
        .hidden { display: none; }
        .stat-badge { background: #f1f5f9; padding: 0.4rem; border-radius: 0.75rem; text-align: center; min-width: 2.5rem; border-bottom: 4px solid #cbd5e1; font-weight: 900; }
    </style>
</head>
<body>
    <div class="max-w-md">
        <header>
            <div style="color: white; font-weight: 900; font-style: italic; text-transform: uppercase; text-align: center; font-size: 1.5rem;">Pickleball <span style="color: #f97316;">Matcher</span></div>
            <div id="current-match-ui"></div>
        </header>

        <div id="navigation" class="tab-bar hidden">
            <button onclick="switchTab('players')" id="nav-players" class="tab-btn tab-active">PLAYERS</button>
            <button onclick="switchTab('schedule')" id="nav-schedule" class="tab-btn">SCHEDULE</button>
        </div>

        <main style="padding: 1.5rem; flex: 1;">
            <div id="view-setup">
                <div class="card">
                    <h2 style="font-size: 0.7rem; font-weight: 900; margin-bottom: 1rem; color: #94a3b8;">ADD PLAYERS</h2>
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="text" id="setup-name" placeholder="NAME" style="flex: 1; padding: 1rem; border-radius: 1rem; border: none; background: #f1f5f9; font-weight: 700; outline:none;">
                        <button onclick="addPlayer('setup-name')" style="background:#0f172a; color:white; border:none; padding: 0 1.5rem; border-radius: 1rem; font-weight: 900; cursor:pointer;">＋</button>
                    </div>
                    <div id="setup-list" style="margin-top: 1rem; max-height:250px; overflow-y:auto;"></div>
                </div>
                <button id="start-btn" onclick="startApp()" class="btn-orange" style="margin-top: 1.5rem;" disabled>Start Matching</button>
            </div>

            <div id="view-game" class="hidden">
                <div id="tab-players">
                    <div id="player-stats-list" class="card" style="padding: 0; overflow: hidden;"></div>
                    <div style="display:flex; gap:0.5rem; margin-top:1rem;">
                        <input type="text" id="add-more" placeholder="ADD PLAYER" style="flex:1; padding:1rem; border:none; border-bottom:2px solid #e2e8f0; font-weight:700; text-transform:uppercase; outline:none;">
                        <button onclick="addPlayer('add-more')" style="background:#0f172a; color:white; border:none; padding:0 1.2rem; border-radius:1rem; font-weight:900; cursor:pointer;">ADD</button>
                    </div>
                </div>
                <div id="tab-schedule" class="hidden">
                    <div id="schedule-list"></div>
                    <button onclick="previewLimit+=4; render();" style="width:100%; padding:1rem; background:white; border-radius:1.5rem; color:#94a3b8; font-weight:900; margin: 1rem 0 3rem;">MORE GAMES (+4)</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let players = [];
        let matchHistory = [];
        let isStarted = false;
        let activeTab = 'players';
        let previewLimit = 8;

        function addPlayer(id) {
            const input = document.getElementById(id);
            const name = input.value.trim();
            if (!name) return;
            if (players.some(p => p.name.toLowerCase() === name.toLowerCase())) { alert("此姓名已存在"); return; }
            players.push({ id: Date.now(), name, playCount: 0, wins: 0, losses: 0, consecutive: 0, isActive: true });
            input.value = '';
            if (isStarted) syncMatch();
            render();
        }

        function syncMatch() {
            if (!isStarted || matchHistory.length === 0) return;
            let current = matchHistory[0];
            if (!current.completed) {
                const activeOnes = players.filter(p => p.isActive);
                const stillValid = (current.allIds || []).length === 4 && current.allIds.every(id => activeOnes.some(p => p.id === id));
                if (!stillValid) {
                    const lastFinished = matchHistory[1]?.allIds || null;
                    const newMatch = calculateMatchLogic(players, lastFinished);
                    if (newMatch) matchHistory[0] = { ...current, ...newMatch };
                }
            }
        }

        function calculateMatchLogic(pool, lastIds) {
            const active = pool.filter(p => p.isActive);
            if (active.length < 4) return null;
            let sorted = [...active].sort((a, b) => (a.playCount - b.playCount) || (a.consecutive - b.consecutive));
            const canRest = sorted.filter(p => p.consecutive < 2);
            let selected = (canRest.length >= 4) ? canRest.slice(0, 4) : sorted.slice(0, 4);
            if (lastIds && active.length > 4) {
                if (selected.map(p=>p.id).sort().join(',') === [...lastIds].sort().join(',')) {
                    const sub = sorted.find(p => !selected.map(s=>s.id).includes(p.id));
                    if (sub) selected[3] = sub;
                }
            }
            return { teamAIds: [selected[0].id, selected[3].id], teamBIds: [selected[1].id, selected[2].id], allIds: selected.map(p => p.id) };
        }

        function startApp() {
            const m = calculateMatchLogic(players, null);
            if (!m) return;
            matchHistory.push({ round: 1, ...m, scoreA: '', scoreB: '', completed: false });
            isStarted = true;
            document.getElementById('view-setup').classList.add('hidden');
            document.getElementById('view-game').classList.remove('hidden');
            document.getElementById('navigation').classList.remove('hidden');
            render();
        }

        function updateStats(match, sA, sB, factor) {
            players = players.map(p => {
                const isA = match.teamAIds.includes(p.id);
                const isB = match.teamBIds.includes(p.id);
                if (!isA && !isB) return p;
                const won = (isA && sA > sB) || (isB && sB > sA);
                if (sA === sB) return p;
                return { ...p, wins: p.wins + (won ? factor : 0), losses: p.losses + (won ? 0 : factor) };
            });
        }

        function endRound() {
            const sA = parseInt(document.getElementById('scA').value);
            const sB = parseInt(document.getElementById('scB').value);
            if (isNaN(sA) || isNaN(sB)) { alert("請輸入比分"); return; }
            let curr = matchHistory[0];
            curr.scoreA = sA; curr.scoreB = sB; curr.completed = true;
            
            updateStats(curr, sA, sB, 1);
            players = players.map(p => {
                if (!curr.allIds.includes(p.id)) return { ...p, consecutive: 0 };
                return { ...p, playCount: p.playCount + 1, consecutive: p.consecutive + 1 };
            });

            matchHistory.unshift({ round: curr.round + 1, completed: false, allIds: [], teamAIds: [], teamBIds: [] });
            syncMatch(); render();
        }

        function handleEdit(round) {
            const idx = matchHistory.findIndex(m => m.round === round);
            const m = matchHistory[idx];
            const nA = prompt(`修改 Game ${round} Team A 分數:`, m.scoreA);
            const nB = prompt(`修改 Game ${round} Team B 分數:`, m.scoreB);
            if (nA === null || nB === null) return;
            const newSA = parseInt(nA), newSB = parseInt(nB);
            
            updateStats(m, m.scoreA, m.scoreB, -1);
            updateStats(m, newSA, newSB, 1);
            matchHistory[idx] = { ...m, scoreA: newSA, scoreB: newSB };
            render();
        }

        function handleSubs(oldId) {
            const name = prompt("輸入新球員姓名:");
            if (!name || !name.trim()) return;
            if (players.some(p => p.name.toLowerCase() === name.trim().toLowerCase())) { alert("此姓名已存在"); return; }
            players = players.map(p => p.id === oldId ? { ...p, isActive: false, consecutive: 0 } : p);
            players.push({ id: Date.now(), name: name.trim(), playCount: 0, wins: 0, losses: 0, consecutive: 0, isActive: true });
            syncMatch(); render();
        }

        function switchTab(t) {
            activeTab = t;
            document.getElementById('tab-players').className = t === 'players' ? '' : 'hidden';
            document.getElementById('tab-schedule').className = t === 'schedule' ? '' : 'hidden';
            document.getElementById('nav-players').className = `tab-btn ${t==='players'?'tab-active':''}`;
            document.getElementById('nav-schedule').className = `tab-btn ${t==='schedule'?'tab-active':''}`;
            render();
        }

        function render() {
            const getP = (id) => players.find(p => p.id === id) || { name: '已離場' };
            document.getElementById('start-btn').disabled = players.length < 4;

            // Setup List
            document.getElementById('setup-list').innerHTML = players.map(p => `
                <div style="display:flex; justify-content:space-between; padding:0.75rem; background:#f8fafc; margin-bottom:4px; border-radius:0.75rem; align-items:center;">
                    <span style="font-weight:700;">${p.name}</span>
                    <button onclick="players=players.filter(x=>x.id!==${p.id});render();" style="color:#f87171; border:none; background:none; font-size:10px; font-weight:900;">REMOVE</button>
                </div>
            `).join('');

            // Header (Current Match)
            const curr = matchHistory.find(m => !m.completed);
            const slot = document.getElementById('current-match-ui');
            if (isStarted && curr && (curr.allIds || []).length === 4) {
                slot.innerHTML = `
                <div class="card" style="box-shadow: 0 10px 20px rgba(0,0,0,0.1);">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; border-bottom:1px solid #f1f5f9; padding-bottom:0.5rem;">
                        <span style="font-size:10px; font-weight:900; background:#0f172a; color:white; padding:4px 10px; border-radius:10px;">G${curr.round} · LIVE</span>
                        <div style="display:flex; gap:5px;">
                            <input type="number" id="scA" class="score-input">
                            <input type="number" id="scB" class="score-input">
                            <button onclick="endRound()" style="background:#f97316; color:white; border:none; padding:0 15px; border-radius:10px; font-weight:900; cursor:pointer;">END</button>
                        </div>
                    </div>
                    <div style="display:flex; justify-content:space-around; text-align:center; font-weight:900;">
                        <div style="width:40%">${getP(curr.teamAIds[0]).name}<br>${getP(curr.teamAIds[1]).name}</div>
                        <div style="color:#e2e8f0; font-style:italic;">VS</div>
                        <div style="width:40%">${getP(curr.teamBIds[0]).name}<br>${getP(curr.teamBIds[1]).name}</div>
                    </div>
                </div>`;
            } else if (isStarted) {
                slot.innerHTML = `<div class="card" style="text-align:center; color:#94a3b8; font-weight:700;">需要 4 位活躍球員</div>`;
            }

            // Players Tab
            document.getElementById('player-stats-list').innerHTML = players.map(p => `
                <div style="display:flex; justify-content:space-between; padding:1rem; border-bottom:1px solid #f1f5f9; ${p.isActive?'':'opacity:0.3'}">
                    <div style="display:flex; gap:1rem; align-items:center;">
                        <div class="stat-badge"><div style="font-size:8px; color:#94a3b8;">G</div>${p.playCount}</div>
                        <div><div style="font-weight:900;">${p.name}</div><div style="font-size:10px; color:#059669; font-weight:900;">W:${p.wins} L:${p.losses}</div></div>
                    </div>
                    ${p.isActive ? `<div>
                        <button onclick="handleSubs(${p.id})" style="border:none; background:none; color:#3b82f6; font-weight:900; font-size:10px; margin-right:10px; cursor:pointer;">SUBS</button>
                        <button onclick="players=players.map(x=>x.id===${p.id}?{...x,isActive:false}:x);syncMatch();render();" style="border:none; background:none; color:#94a3b8; font-weight:900; font-size:10px; cursor:pointer;">DROP</button>
                    </div>` : `
                        <button onclick="players=players.map(x=>x.id===${p.id}?{...x,isActive:true}:x);syncMatch();render();" style="border:none; background:none; color:#059669; font-weight:900; font-size:10px; cursor:pointer;">ACTIVATE</button>
                    `}
                </div>
            `).join('');

            // Schedule Tab (DONE + LIVE + PREVIEW)
            let schedHTML = '';
            let history = [...matchHistory].filter(m => m.completed).reverse();
            let tPlayers = players.map(p => ({...p}));
            
            history.forEach(m => {
                schedHTML += `<div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <span style="font-size:10px; color:#94a3b8; font-weight:900;">GAME ${m.round}</span>
                        <div><span style="font-size:10px; color:#94a3b8; font-style:italic; margin-right:8px;">DONE</span><button onclick="handleEdit(${m.round})" style="color:#f97316; font-size:10px; font-weight:900; border:none; background:none; text-decoration:underline; cursor:pointer;">EDIT</button></div>
                    </div>
                    <div style="display:flex; justify-content:space-between; text-align:center; font-weight:900;">
                        <div style="width:40%;">${getP(m.teamAIds[0]).name}<br>${getP(m.teamAIds[1]).name}<div style="color:#f97316; font-size:1.5rem;">${m.scoreA}</div></div>
                        <div style="color:#e2e8f0;">VS</div>
                        <div style="width:40%;">${getP(m.teamBIds[0]).name}<br>${getP(m.teamBIds[1]).name}<div style="color:#f97316; font-size:1.5rem;">${m.scoreB}</div></div>
                    </div>
                </div>`;
            });

            let lastIdSet = history[history.length-1]?.allIds || null;
            let currentRoundNum = history.length + 1;

            for(let i=0; i < previewLimit; i++) {
                let m = (i === 0 && curr && curr.allIds.length === 4) ? curr : calculateMatchLogic(tPlayers, lastIdSet);
                if (!m) break;
                
                schedHTML += `<div class="card ${i > 0 ? 'preview-card' : ''}">
                    <div style="font-size:10px; color:#f97316; font-weight:900; margin-bottom:10px;">GAME ${currentRoundNum} · ${i===0?'LIVE':'PREVIEW'}</div>
                    <div style="display:flex; justify-content:space-between; text-align:center; font-weight:900;">
                        <div style="width:40%;">${getP(m.teamAIds[0]).name}<br>${getP(m.teamAIds[1]).name}</div>
                        <div style="color:#475569;">VS</div>
                        <div style="width:40%;">${getP(m.teamBIds[0]).name}<br>${getP(m.teamBIds[1]).name}</div>
                    </div>
                </div>`;
                m.allIds.forEach(id => { let p = tPlayers.find(x => x.id === id); if(p){ p.playCount++; p.consecutive++; } });
                tPlayers.forEach(p => { if(!m.allIds.includes(p.id)) p.consecutive = 0; });
                lastIdSet = m.allIds; currentRoundNum++;
            }
            document.getElementById('schedule-list').innerHTML = schedHTML;
        }
        render();
    </script>
</body>
</html>
